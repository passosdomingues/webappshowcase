<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DPrintScultor</title>
    
    <style>
        :root {
            --bg-dark-1: rgb(20, 20, 25);
            --bg-dark-2: rgb(25, 25, 30);
            --bg-dark-3: rgb(40, 40, 45);
            --text-light: #E0E0E0;
            --text-white: #FFFFFF;
            --text-accent-1: #4FC3F7;
            --text-accent-2: #81D4FA;
            --text-accent-3: #AED581;
            --text-accent-4: #FFB74D;
            --text-accent-5: #F48FB1;
            --text-accent-6: #CE93D8;
            --text-accent-7: #FFF176;
            --text-config-1: #80CBC4;
            --text-config-2: #B0BEC5;
            --button-bg: #37474F;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            background-color: var(--bg-dark-1);
            color: var(--text-light);
        }

        #root-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* Painel de Controle (Esquerda) */
        #control-panel-scroll {
            width: 400px;
            min-width: 400px;
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            background-color: var(--bg-dark-3);
            border-right: 1px solid var(--bg-dark-1);
        }

        #control-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            gap: 12px;
        }

        h1 {
            font-size: 16px;
            font-weight: bold;
            color: var(--text-accent-1);
            margin: 0;
            text-align: center;
        }

        h2 {
            font-size: 12px;
            color: var(--text-accent-2);
            margin: 0 0 10px 0;
            text-align: center;
        }

        h3 {
            font-weight: bold;
            margin: 10px 0 5px 0;
            align-self: flex-start;
        }

        .section-title-pipeline { color: var(--text-accent-3); }
        .section-title-processing { color: var(--text-accent-4); }
        .section-title-settings { color: var(--text-accent-5); }
        .section-title-preview { color: var(--text-accent-6); }

        .control-section {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 8px;
        }

        .control-section hr {
            width: 100%;
            border: 0;
            border-top: 1px solid var(--bg-dark-1);
            margin: 5px 0;
        }

        button.pipeline-button {
            width: 100%;
            min-height: 35px;
            font-weight: bold;
            background-color: var(--button-bg);
            color: var(--text-white);
            border: none;
            cursor: pointer;
            padding: 8px;
            font-size: 14px;
        }

        button.pipeline-button:hover {
            filter: brightness(1.2);
        }

        button.pipeline-button:disabled {
            background-color: #263238;
            color: #78909C;
            cursor: not-allowed;
        }

        label {
            color: var(--text-white);
            font-size: 13px;
            margin-top: 5px;
        }

        select, input[type="range"] {
            width: 100%;
            padding: 5px;
            background-color: var(--bg-dark-2);
            color: var(--text-light);
            border: 1px solid var(--button-bg);
        }

        input[type="checkbox"] {
            margin-right: 5px;
        }

        #status-label {
            font-size: 11px;
            color: var(--text-light);
            min-height: 40px;
            width: 100%;
            word-wrap: break-word;
        }

        progress {
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
            height: 10px;
        }
        progress::-webkit-progress-bar {
            background-color: var(--button-bg);
        }
        progress::-webkit-progress-value {
            background-color: var(--text-accent-1);
        }

        #config-label {
            font-size: 11px;
            color: var(--text-config-1);
        }

        #config-details {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .config-detail {
            font-size: 10px;
            color: var(--text-config-2);
            margin-left: 10px;
        }

        #image-previews {
            display: flex;
            justify-content: space-around;
            width: 100%;
        }

        .preview-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .preview-box canvas {
            width: 170px; /* (400-30-10) / 2 = 180 */
            height: 113px;
            background-color: var(--bg-dark-2);
            object-fit: contain;
            border: 1px solid var(--button-bg);
        }

        #gcode-title {
            color: var(--text-accent-7);
            font-weight: bold;
        }

        #gcode-preview {
            width: 100%;
            height: 200px;
            font-family: 'Consolas', 'Monospaced';
            font-size: 9px;
            background-color: #263238;
            color: #ECEFF1;
            border: 1px solid var(--button-bg);
            resize: vertical;
        }

        /* Painel Principal (Direita) */
        #main-view {
            flex-grow: 1;
            height: 100vh;
            background-color: var(--bg-dark-2);
            position: relative;
        }

        #main-view canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Input de arquivo oculto */
        #file-input {
            display: none;
        }

    </style>
</head>
<body>

    <div id="root-container">
        
        <div id="control-panel-scroll">
            <div id="control-panel">
                <h1>3D Print Scultor</h1>
                <h2>GTMax Procore H5 - Multi-Material</h2>
                
                <div class="control-section">
                    <hr>
                    <h3 class="section-title-pipeline">PIPELINE DE PROCESSAMENTO</h3>
                    <button id="load-image-btn" class="pipeline-button">1. Carregar & Segmentar Imagem</button>
                    <button id="generate-3d-btn" class="pipeline-button">2. Gerar Modelo 3D</button>
                    <button id="export-stl-btn" class="pipeline-button" disabled>3. Exportar STL</button>
                    <button id="slice-model-btn" class="pipeline-button" disabled>4. Fatiar para Impressão</button>
                    <button id="export-gcode-btn" class="pipeline-button" disabled>5. Gerar G-code Final</button>
                    <progress id="progress-bar" value="0" max="1"></progress>
                    <label id="status-label">Pronto para iniciar o pipeline</label>
                </div>
                
                <div class="control-section">
                    <hr>
                    <h3 class="section-title-processing">PROCESSAMENTO DE IMAGEM</h3>
                    
                    <label for="segmentation-method">Método de Segmentação:</label>
                    <select id="segmentation-method">
                        <option>Intensidade (Brilho)</option>
                        <option>Canny Edge Detection</option>
                        <option>Sobel Gradient</option>
                        <option>Adaptive Threshold</option>
                        <option>Watershed Algorithm</option>
                        <option>Neural Network Segment</option>
                    </select>

                    <label id="threshold-label" for="threshold-slider">Limiar de Segmentação (0.45):</label>
                    <input id="threshold-slider" type="range" min="0.1" max="0.9" value="0.45" step="0.01">

                    <label id="smoothness-label" for="smoothness-slider">Suavização da Superfície (0.7):</label>
                    <input id="smoothness-slider" type="range" min="0.1" max="2.0" value="0.7" step="0.01">

                    <label id="intensity-label" for="intensity-slider">Intensidade 3D (1.0):</label>
                    <input id="intensity-slider" type="range" min="0.1" max="3.0" value="1.0" step="0.01">
                </div>

                <div class="control-section">
                    <hr>
                    <h3 class="section-title-settings">CONFIGURAÇÕES 3D & IMPRESSÃO</h3>
                    
                    <label for="filament-type">Tipo de Filamento:</label>
                    <select id="filament-type">
                        <option>ABS</option>
                        <option>PLA</option>
                        <option>PETG</option>
                        <option>TRITAN</option>
                    </select>
                    
                    <div>
                        <input type="checkbox" id="wireframe-check">
                        <label for="wireframe-check">Visualização Wireframe (Tecla W)</label>
                    </div>

                    <label id="config-label">Configuração Atual: GTMax Procore H5 ABS</label>
                    <div id="config-details">
                        </div>
                </div>

                <div class="control-section">
                    <hr>
                    <h3 class="section-title-preview">PRÉVIA E VISUALIZAÇÃO</h3>
                    
                    <div id="image-previews">
                        <div class="preview-box">
                            <label>Original</label>
                            <canvas id="original-canvas" width="300" height="200"></canvas>
                        </div>
                        <div class="preview-box">
                            <label>Processada</label>
                            <canvas id="processed-canvas" width="300" height="200"></canvas>
                        </div>
                    </div>
                    
                    <label id="gcode-title" for="gcode-preview">PRÉVIA DO G-CODE:</label>
                    <textarea id="gcode-preview" readonly>O G-code gerado aparecerá aqui...</textarea>
                </div>

            </div>
        </div>

        <div id="main-view" id="main-view-container">
            </div>
    </div>
    
    <input type="file" id="file-input" accept="image/png, image/jpeg, image/bmp, image/tiff">

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        // 3.2. Importar módulos do three.js
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // =================================================================
        // CONFIGURAÇÕES GLOBAIS
        // =================================================================

        // Configurações específicas da GTMax Procore H5
        const PRINTER_CONFIGS = {
            "ABS": {
                name: "GTMax Procore H5 ABS",
                nozzleDiameter: 0.5, layerHeight: 0.2, bedTemp: 100, nozzleTemp: 220,
                printSpeed: 60, fanSpeed: 15, retraction: 6, retractionSpeed: 50,
                infillPattern: "gyroid", infillDensity: 5, extrusionWidth: 0.5,
                firstLayerBedTemp: 110, firstLayerNozzleTemp: 250, firstLayerHeight: 0.3
            },
            "PLA": {
                name: "GTMax Procore H5 PLA",
                nozzleDiameter: 0.5, layerHeight: 0.2, bedTemp: 55, nozzleTemp: 200,
                printSpeed: 60, fanSpeed: 100, retraction: 6, retractionSpeed: 50,
                infillPattern: "gyroid", infillDensity: 5, extrusionWidth: 0.5,
                firstLayerBedTemp: 55, firstLayerNozzleTemp: 220, firstLayerHeight: 0.3
            },
            "PETG": {
                name: "GTMax Procore H5 PETG",
                nozzleDiameter: 0.5, layerHeight: 0.16, bedTemp: 65, nozzleTemp: 245,
                printSpeed: 80, fanSpeed: 100, retraction: 6, retractionSpeed: 45,
                infillPattern: "gyroid", infillDensity: 10, extrusionWidth: 0.4,
                firstLayerBedTemp: 65, firstLayerNozzleTemp: 250, firstLayerHeight: 0.3
            },
            "TRITAN": {
                name: "GTMax Procore H5 TRITAN",
                nozzleDiameter: 0.5, layerHeight: 0.16, bedTemp: 110, nozzleTemp: 265,
                printSpeed: 80, fanSpeed: 50, retraction: 6, retractionSpeed: 45,
                infillPattern: "gyroid", infillDensity: 10, extrusionWidth: 0.4,
                firstLayerBedTemp: 110, firstLayerNozzleTemp: 275, firstLayerHeight: 0.3
            }
        };
        
        // ** NOTA IMPORTANTE DO USUÁRIO **
        // O usuário pediu "sempre com preenchimento de 5% de densidade, tipo hexagono, podendo alterar".
        // O código Java original tem 'gyroid' como padrão. Vou alterar para 'hexagon' e 5% como padrão
        // para atender ao pedido, mas mantendo a lógica do Java.
        
        PRINTER_CONFIGS["ABS"].infillPattern = "hexagon"; PRINTER_CONFIGS["ABS"].infillDensity = 5;
        PRINTER_CONFIGS["PLA"].infillPattern = "hexagon"; PRINTER_CONFIGS["PLA"].infillDensity = 5;
        PRINTER_CONFIGS["PETG"].infillPattern = "hexagon"; PRINTER_CONFIGS["PETG"].infillDensity = 5;
        PRINTER_CONFIGS["TRITAN"].infillPattern = "hexagon"; PRINTER_CONFIGS["TRITAN"].infillDensity = 5;
        
        let currentPrinterConfig = PRINTER_CONFIGS["ABS"];

        // Constantes avançadas
        const MAX_MODEL_HEIGHT = 50.0; // mm

        // UI Components (DOM Elements)
        const fileInput = document.getElementById('file-input');
        const originalCanvas = document.getElementById('original-canvas');
        const processedCanvas = document.getElementById('processed-canvas');
        const originalCtx = originalCanvas.getContext('2d', { willReadFrequently: true });
        const processedCtx = processedCanvas.getContext('2d', { willReadFrequently: true });
        
        const mainViewContainer = document.getElementById('main-view');
        const progressBar = document.getElementById('progress-bar');
        const statusLabel = document.getElementById('status-label');
        const wireframeCheck = document.getElementById('wireframe-check');
        const exportStlButton = document.getElementById('export-stl-btn');
        const sliceModelButton = document.getElementById('slice-model-btn');
        const exportGcodeButton = document.getElementById('export-gcode-btn');
        const gcodePreview = document.getElementById('gcode-preview');
        const segmentationMethodCombo = document.getElementById('segmentation-method');
        const filamentTypeCombo = document.getElementById('filament-type');
        const thresholdSlider = document.getElementById('threshold-slider');
        const smoothnessSlider = document.getElementById('smoothness-slider');
        const intensitySlider = document.getElementById('intensity-slider');

        // 3D View Controls (three.js)
        let scene, camera, renderer, modelGroup, meshView, meshMaterial, controls;

        // Data
        let originalImage, processedImage;
        let currentMesh; // Será um THREE.BufferGeometry
        let slicedLayers = [];
        
        // Advanced processing data
        let heightMap;
        let binaryMap;
        let edgePoints = [];

        // =================================================================
        // INICIALIZAÇÃO
        // =================================================================

        function initializeApp() {
            initialize3DScene();
            setupEventListeners();
            updateConfigDetails();
            updateStatus("Pronto para iniciar o pipeline");
        }

        function initialize3DScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(varToRGB('--bg-dark-2'));

            // Câmera
            const width = mainViewContainer.clientWidth;
            const height = mainViewContainer.clientHeight;
            camera = new THREE.PerspectiveCamera(35, width / height, 0.1, 10000);
            camera.position.z = 500; // Invertido do JavaFX
            
            // Luzes
            const ambientLight = new THREE.AmbientLight(0x505064); // rgb(80, 80, 100)
            scene.add(ambientLight);
            
            const pointLight = new THREE.PointLight(0xFFFFFF, 1.0);
            pointLight.position.set(-100, -100, -100); // JavaFX usa Z negativo para "dentro"
            scene.add(pointLight);

            // Grupo do Modelo
            modelGroup = new THREE.Group();
            scene.add(modelGroup);

            // Material
            meshMaterial = new THREE.MeshPhongMaterial({
                color: 0x778899, // LIGHTSLATEGRAY
                side: THREE.DoubleSide, // Renderizar ambos os lados
                flatShading: false
            });

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(width, height);
            mainViewContainer.appendChild(renderer.domElement);
            
            // Controles
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.1;

            // Redimensionamento
            window.addEventListener('resize', onWindowResize, false);
            
            // Loop de animação
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            const width = mainViewContainer.clientWidth;
            const height = mainViewContainer.clientHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        }

        function varToRGB(varName) {
            const rgbString = getComputedStyle(document.documentElement).getPropertyValue(varName);
            const rgb = rgbString.match(/\d+/g).map(Number);
            return new THREE.Color(rgb[0] / 255, rgb[1] / 255, rgb[2] / 255);
        }

        // =================================================================
        // EVENT LISTENERS (UI)
        // =================================================================

        function setupEventListeners() {
            // Botões do Pipeline
            document.getElementById('load-image-btn').addEventListener('click', loadAndProcessImage);
            document.getElementById('generate-3d-btn').addEventListener('click', generate3DModel);
            exportStlButton.addEventListener('click', exportToSTL);
            sliceModelButton.addEventListener('click', sliceForPrinting);
            exportGcodeButton.addEventListener('click', generateFinalGcode);

            // Sliders
            thresholdSlider.addEventListener('input', e => {
                document.getElementById('threshold-label').innerText = `Limiar de Segmentação (${parseFloat(e.target.value).toFixed(2)}):`;
            });
            smoothnessSlider.addEventListener('input', e => {
                document.getElementById('smoothness-label').innerText = `Suavização da Superfície (${parseFloat(e.target.value).toFixed(1)}):`;
            });
            intensitySlider.addEventListener('input', e => {
                document.getElementById('intensity-label').innerText = `Intensidade 3D (${parseFloat(e.target.value).toFixed(1)}):`;
            });
            
            // Combos e Check
            filamentTypeCombo.addEventListener('change', updatePrinterConfig);
            wireframeCheck.addEventListener('change', toggleWireframe);
            
            // Input de arquivo
            fileInput.addEventListener('change', handleFileSelect);
            
            // Teclas de atalho
            document.addEventListener('keydown', e => {
                switch (e.code) {
                    case 'KeyR': // Reset view
                        controls.reset();
                        camera.position.z = 500;
                        break;
                    case 'KeyW': // Toggle wireframe
                        wireframeCheck.checked = !wireframeCheck.checked;
                        toggleWireframe();
                        break;
                    case 'KeyF': // Focus
                        if (meshView) centerPivot(meshView);
                        break;
                    case 'Digit1': loadAndProcessImage(); break;
                    case 'Digit2': generate3DModel(); break;
                    case 'Digit3': exportToSTL(); break;
                    case 'Digit4': sliceForPrinting(); break;
                    case 'Digit5': generateFinalGcode(); break;
                }
            });
        }
        
        function updatePrinterConfig() {
            const selectedFilament = filamentTypeCombo.value;
            currentPrinterConfig = PRINTER_CONFIGS[selectedFilament];
            if (currentPrinterConfig) {
                updateStatus("Configuração alterada para: " + currentPrinterConfig.name);
                document.getElementById('config-label').innerText = "Configuração Atual: " + currentPrinterConfig.name;
                updateConfigDetails();
            }
        }
        
        function updateConfigDetails() {
            const container = document.getElementById('config-details');
            container.innerHTML = ''; // Limpa
            const c = currentPrinterConfig;
            
            const createDetail = (label, value) => {
                const el = document.createElement('span');
                el.className = 'config-detail';
                el.innerText = `  ${label} ${value}`;
                return el;
            };
            
            container.appendChild(createDetail("Bico:", c.nozzleDiameter + "mm"));
            container.appendChild(createDetail("Camada:", c.layerHeight + "mm"));
            container.appendChild(createDetail("Mesa:", c.bedTemp + "°C"));
            container.appendChild(createDetail("Bico:", c.nozzleTemp + "°C"));
            container.appendChild(createDetail("Ventoinha:", c.fanSpeed + "%"));
            container.appendChild(createDetail("Preenchimento:", c.infillPattern + " " + c.infillDensity + "%"));
            container.appendChild(createDetail("1a Camada Mesa:", c.firstLayerBedTemp + "°C"));
            container.appendChild(createDetail("1a Camada Bico:", c.firstLayerNozzleTemp + "°C"));
        }
        
        function toggleWireframe() {
            if (meshMaterial) {
                meshMaterial.wireframe = wireframeCheck.checked;
            }
        }

        // =================================================================
        // PIPELINE - 1. PROCESSAMENTO DE IMAGEM
        // =================================================================

        function loadAndProcessImage() {
            fileInput.click();
        }

        async function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            updateStatus("Carregando e analisando imagem...");
            updateProgress(0.1);

            try {
                // Carregar imagem
                originalImage = await loadImageFromFile(file);
                
                // Desenhar no canvas original
                originalCanvas.width = originalImage.width;
                originalCanvas.height = originalImage.height;
                originalCtx.drawImage(originalImage, 0, 0);

                // Desenhar thumbnail
                drawThumbnail(originalCanvas, document.getElementById('original-canvas'));

                updateStatus("Aplicando segmentação inteligente...");
                await sleep(50); // Dá tempo para a UI atualizar

                // Processar
                const method = segmentationMethodCombo.value;
                const threshold = parseFloat(thresholdSlider.value);
                
                const result = processImageWithSegmentation(originalImage, method, threshold);
                
                heightMap = result.heightMap;
                binaryMap = result.binaryMap;
                edgePoints = result.edgePoints;

                // Desenhar no canvas processado
                processedCanvas.width = originalImage.width;
                processedCanvas.height = originalImage.height;
                processedCtx.putImageData(result.processedImageData, 0, 0);
                
                // Desenhar thumbnail
                drawThumbnail(processedCanvas, document.getElementById('processed-canvas'));

                updateStatus(`Segmentação completa! ${edgePoints.length} bordas, mapa ${heightMap.length}x${heightMap[0].length}`);
                updateProgress(1.0);
                
                // Habilitar próxima etapa
                document.getElementById('generate-3d-btn').disabled = false;
                
            } catch (error) {
                updateStatus("Erro: " + error.message);
                console.error(error);
                updateProgress(0);
            }
        }
        
        function loadImageFromFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
        
        function drawThumbnail(sourceCanvas, targetCanvas) {
            const targetCtx = targetCanvas.getContext('2d');
            targetCtx.fillStyle = "rgb(40,40,45)";
            targetCtx.fillRect(0, 0, targetCanvas.width, targetCanvas.height);
            
            const hRatio = targetCanvas.width / sourceCanvas.width;
            const vRatio = targetCanvas.height / sourceCanvas.height;
            const ratio = Math.min(hRatio, vRatio);
            
            const centerShift_x = (targetCanvas.width - sourceCanvas.width * ratio) / 2;
            const centerShift_y = (targetCanvas.height - sourceCanvas.height * ratio) / 2;
            
            targetCtx.drawImage(sourceCanvas, 0, 0, sourceCanvas.width, sourceCanvas.height,
                                centerShift_x, centerShift_y, sourceCanvas.width * ratio, sourceCanvas.height * ratio);
        }

        // Esta é a portabilidade direta da lógica de processamento de imagem do Java
        function processImageWithSegmentation(image, method, threshold) {
            const width = image.width;
            const height = image.height;
            
            originalCtx.drawImage(image, 0, 0);
            const imageData = originalCtx.getImageData(0, 0, width, height);
            const data = imageData.data;
            
            const processedImageData = processedCtx.createImageData(width, height);
            const processedData = processedImageData.data;

            // Arrays 2D
            let grayScale = new Array(width).fill(0).map(() => new Array(height).fill(0));
            let binary = new Array(width).fill(0).map(() => new Array(height).fill(false));
            let edges = [];
            
            // 1. Converter para grayscale
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const i = (y * width + x) * 4;
                    const r = data[i];
                    const g = data[i+1];
                    const b = data[i+2];
                    grayScale[x][y] = (r * 0.299 + g * 0.587 + b * 0.114) / 255.0; // Normalizado 0-1
                }
            }
            
            // 2. Aplicar método de segmentação
            switch (method) {
                case "Canny Edge Detection":
                    edges = applyCannyEdgeDetection(grayScale, threshold, width, height);
                    break;
                case "Sobel Gradient":
                    edges = applySobelEdgeDetection(grayScale, threshold, width, height);
                    break;
                case "Adaptive Threshold":
                    applyAdaptiveThreshold(grayScale, binary, width, height);
                    break;
                case "Watershed Algorithm":
                    edges = applyWatershedSegmentation(grayScale, width, height);
                    break;
                case "Neural Network Segment":
                    edges = applyDefaultSegmentation(grayScale, threshold, width, height);
                    break;
                default: // Intensidade (Brilho)
                    edges = applyIntensityBasedSegmentation(grayScale, threshold, binary, width, height);
                    break;
            }
            
            // 3. Criar imagem processada (visualização)
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const i = (y * width + x) * 4;
                    let color = 0;
                    
                    if (method.includes("Edge") || method.includes("Gradient")) {
                        const isEdge = edges.some(p => Math.abs(p.x - x) < 1 && Math.abs(p.y - y) < 1);
                        if (isEdge) {
                            processedData[i] = 255;   // R
                            processedData[i + 1] = 0; // G
                            processedData[i + 2] = 0; // B
                        } else {
                            color = grayScale[x][y] * 255;
                            processedData[i] = color;
                            processedData[i + 1] = color;
                            processedData[i + 2] = color;
                        }
                    } else {
                        color = binary[x][y] ? 255 : 0;
                        processedData[i] = color;
                        processedData[i + 1] = color;
                        processedData[i + 2] = color;
                    }
                    processedData[i + 3] = 255; // Alpha
                }
            }

            // 4. Criar height map
            const newHeightMap = createHeightMapFromSegmentation(grayScale, binary, edges, width, height);

            return { processedImageData, heightMap: newHeightMap, binaryMap: binary, edgePoints: edges };
        }
        
        // --- Funções de Segmentação (Portadas do Java) ---
        
        function applyCannyEdgeDetection(grayScale, threshold, width, height) {
            let edges = [];
            let blurred = applyGaussianBlur(grayScale, width, height, 1.4);
            let magnitude = new Array(width).fill(0).map(() => new Array(height).fill(0));

            for (let x = 1; x < width - 1; x++) {
                for (let y = 1; y < height - 1; y++) {
                    const gx = (blurred[x+1][y-1] + 2*blurred[x+1][y] + blurred[x+1][y+1]) -
                               (blurred[x-1][y-1] + 2*blurred[x-1][y] + blurred[x-1][y+1]);
                    const gy = (blurred[x-1][y+1] + 2*blurred[x][y+1] + blurred[x+1][y+1]) -
                               (blurred[x-1][y-1] + 2*blurred[x][y-1] + blurred[x+1][y-1]);
                    magnitude[x][y] = Math.sqrt(gx*gx + gy*gy);
                }
            }

            for (let x = 2; x < width - 2; x++) {
                for (let y = 2; y < height - 2; y++) {
                    if (magnitude[x][y] > threshold) {
                        edges.push({x, y});
                    }
                }
            }
            return edges;
        }

        function applySobelEdgeDetection(grayScale, threshold, width, height) {
            let edges = [];
            const sobelX = [[-1, 0, 1], [-2, 0, 2], [-1, 0, 1]];
            const sobelY = [[-1, -2, -1], [0, 0, 0], [1, 2, 1]];

            for (let x = 1; x < width - 1; x++) {
                for (let y = 1; y < height - 1; y++) {
                    let gx = 0, gy = 0;
                    for (let i = -1; i <= 1; i++) {
                        for (let j = -1; j <= 1; j++) {
                            gx += grayScale[x+i][y+j] * sobelX[i+1][j+1];
                            gy += grayScale[x+i][y+j] * sobelY[i+1][j+1];
                        }
                    }
                    const magnitude = Math.sqrt(gx*gx + gy*gy);
                    if (magnitude > threshold) {
                        edges.push({x, y});
                    }
                }
            }
            return edges;
        }

        function applyIntensityBasedSegmentation(grayScale, threshold, binary, width, height) {
            let edges = [];
            for (let x = 1; x < width - 1; x++) {
                for (let y = 1; y < height - 1; y++) {
                    // Lógica do Java: se brilho > threshold, faz parte do binário
                    if (grayScale[x][y] > threshold) {
                        binary[x][y] = true;
                    }
                    
                    // Lógica de borda do Java
                    const grad = Math.abs(grayScale[x][y] - grayScale[x-1][y]) +
                                 Math.abs(grayScale[x][y] - grayScale[x+1][y]) +
                                 Math.abs(grayScale[x][y] - grayScale[x][y-1]) +
                                 Math.abs(grayScale[x][y] - grayScale[x][y+1]);
                    
                    if (grad > threshold * 4) { // Lógica do Java
                        edges.push({x, y});
                    }
                }
            }
            return edges;
        }

        function applyAdaptiveThreshold(grayScale, binary, width, height) {
            const blockSize = 15;
            const constant = 10 / 255.0; // Normalizado

            for (let x = 0; x < width; x++) {
                for (let y = 0; y < height; y++) {
                    let sum = 0;
                    let count = 0;
                    for (let i = Math.max(0, x - Math.floor(blockSize/2)); i <= Math.min(width-1, x + Math.floor(blockSize/2)); i++) {
                        for (let j = Math.max(0, y - Math.floor(blockSize/2)); j <= Math.min(height-1, y + Math.floor(blockSize/2)); j++) {
                            sum += grayScale[i][j];
                            count++;
                        }
                    }
                    const mean = sum / count;
                    binary[x][y] = grayScale[x][y] > (mean - constant);
                }
            }
        }

        function applyWatershedSegmentation(grayScale, width, height) {
            let markers = [];
            for (let x = 1; x < width - 1; x++) {
                for (let y = 1; y < height - 1; y++) {
                    const v = grayScale[x][y];
                    if (v < grayScale[x-1][y] && v < grayScale[x+1][y] &&
                        v < grayScale[x][y-1] && v < grayScale[x][y+1]) {
                        markers.push({x, y});
                    }
                }
            }
            return markers;
        }

        function applyDefaultSegmentation(grayScale, threshold, width, height) {
            // Placeholder, usa o baseado em intensidade
            return applyIntensityBasedSegmentation(grayScale, threshold, new Array(width).fill(0).map(() => new Array(height).fill(false)), width, height);
        }

        function applyGaussianBlur(input, width, height, sigma) {
            let output = new Array(width).fill(0).map(() => new Array(height).fill(0));
            const size = 5;
            const half = Math.floor(size / 2);
            const kernel = createGaussianKernel(size, sigma);

            for (let x = half; x < width - half; x++) {
                for (let y = half; y < height - half; y++) {
                    let sum = 0;
                    for (let i = -half; i <= half; i++) {
                        for (let j = -half; j <= half; j++) {
                            sum += input[x+i][y+j] * kernel[i+half][j+half];
                        }
                    }
                    output[x][y] = sum;
                }
            }
            return output;
        }

        function createGaussianKernel(size, sigma) {
            let kernel = new Array(size).fill(0).map(() => new Array(size).fill(0));
            let sum = 0;
            const half = Math.floor(size / 2);

            for (let x = -half; x <= half; x++) {
                for (let y = -half; y <= half; y++) {
                    const val = Math.exp(-(x*x + y*y) / (2 * sigma * sigma));
                    kernel[x+half][y+half] = val;
                    sum += val;
                }
            }
            // Normalize
            for (let i = 0; i < size; i++) {
                for (let j = 0; j < size; j++) {
                    kernel[i][j] /= sum;
                }
            }
            return kernel;
        }

        function createHeightMapFromSegmentation(grayScale, binary, edges, width, height) {
            let heightMap = new Array(width).fill(0).map(() => new Array(height).fill(0));
            const intensityMultiplier = parseFloat(intensitySlider.value);
            const smoothness = parseFloat(smoothnessSlider.value);

            // Create base height map
            for (let x = 0; x < width; x++) {
                for (let y = 0; y < height; y++) {
                    let baseHeight = grayScale[x][y] * intensityMultiplier * MAX_MODEL_HEIGHT;
                    
                    // Enhance edges
                    const isEdge = edges.some(p => Math.abs(p.x - x) < 2 && Math.abs(p.y - y) < 2);
                    
                    if (isEdge) {
                        baseHeight *= 1.2; // Boost edges
                    }
                    
                    heightMap[x][y] = Math.min(baseHeight, MAX_MODEL_HEIGHT);
                }
            }
            
            // Apply smoothing
            if (smoothness > 0.1) {
                heightMap = applyHeightSmoothing(heightMap, width, height, smoothness);
            }
            
            return heightMap;
        }

        function applyHeightSmoothing(heightMap, width, height, smoothness) {
            let smoothed = new Array(width).fill(0).map(() => new Array(height).fill(0));
            const radius = Math.floor(smoothness * 2);
            const smoothnessSq = smoothness * smoothness;

            for (let x = 0; x < width; x++) {
                for (let y = 0; y < height; y++) {
                    let sum = 0;
                    let count = 0;
                    
                    for (let i = Math.max(0, x - radius); i <= Math.min(width-1, x + radius); i++) {
                        for (let j = Math.max(0, y - radius); j <= Math.min(height-1, y + radius); j++) {
                            const weight = Math.exp(-((x-i)*(x-i) + (y-j)*(y-j)) / smoothnessSq);
                            sum += heightMap[i][j] * weight;
                            count += weight;
                        }
                    }
                    
                    smoothed[x][y] = sum / count;
                }
            }
            return smoothed;
        }

        function createIntelligentMeshFromHeightMap(heightMap) {
            const width = heightMap.length;
            const height = heightMap[0].length;
            
            const geometry = new THREE.BufferGeometry();
            
            const scaleX = 100.0 / width;  // 100mm max width
            const scaleY = 100.0 / height; // 100mm max height
            
            const vertices = [];
            const uvs = [];
            
            for (let x = 0; x < width; x++) {
                for (let y = 0; y < height; y++) {
                    // JavaFX Y-down, three.js Y-up. Invertemos Y no vertex
                    // JavaFX Z-up, three.js Z-forward. Trocamos Z e Y.
                    const px = (x * scaleX) - 50; // Center X
                    const pz = (y * scaleY) - 50; // Center Z (chão)
                    const py = heightMap[x][y];   // Altura é Y
                    
                    vertices.push(px, py, pz);
                    
                    const u = x / (width - 1);
                    const v = y / (height - 1);
                    uvs.push(u, v);
                }
            }
            
            const indices = [];
            for (let x = 0; x < width - 1; x++) {
                for (let y = 0; y < height - 1; y++) {
                    const v00 = x * height + y;
                    const v01 = x * height + (y + 1);
                    const v10 = (x + 1) * height + y;
                    const v11 = (x + 1) * height + (y + 1);
                    
                    // Invertemos a ordem dos vértices (winding order)
                    // porque o JavaFX e o three.js podem ter padrões diferentes
                    indices.push(v00, v11, v10); // Triângulo 1
                    indices.push(v11, v00, v01); // Triângulo 2
                }
            }
            
            geometry.setIndex(indices);
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            geometry.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
            
            geometry.computeVertexNormals(); // Magia do three.js
            
            return geometry;
        }

        // Portado do Java (exportMeshToSTL)
        function exportMeshToSTL(geometry) {
            const positions = geometry.attributes.position.array;
            const indices = geometry.index.array;
            const numFaces = indices.length / 3;
            
            let stl = "solid 3d_model\n";

            for (let i = 0; i < numFaces; i++) {
                const i1 = indices[i * 3 + 0];
                const i2 = indices[i * 3 + 1];
                const i3 = indices[i * 3 + 2];
                
                const v1 = new THREE.Vector3(positions[i1*3], positions[i1*3+1], positions[i1*3+2]);
                const v2 = new THREE.Vector3(positions[i2*3], positions[i2*3+1], positions[i2*3+2]);
                const v3 = new THREE.Vector3(positions[i3*3], positions[i3*3+1], positions[i3*3+2]);
                
                const normal = calculateSurfaceNormal(v1, v2, v3);
                
                stl += `  facet normal ${normal.x.toFixed(6)} ${normal.y.toFixed(6)} ${normal.z.toFixed(6)}\n`;
                stl += "    outer loop\n";
                stl += `      vertex ${v1.x.toFixed(6)} ${v1.y.toFixed(6)} ${v1.z.toFixed(6)}\n`;
                stl += `      vertex ${v2.x.toFixed(6)} ${v2.y.toFixed(6)} ${v2.z.toFixed(6)}\n`;
                stl += `      vertex ${v3.x.toFixed(6)} ${v3.y.toFixed(6)} ${v3.z.toFixed(6)}\n`;
                stl += "    endloop\n";
                stl += "  endfacet\n";
                
                if (i % 1000 === 0) {
                    updateProgress(i / numFaces);
                }
            }
            stl += "endsolid 3d_model\n";
            return stl;
        }

        // AVISO: Esta classe é uma portabilidade 1:1 do 'AdvancedSlicer' do Java.
        // O slicer original é um PLACEHOLDER. Ele NÃO fatia o modelo 3D.
        // Ele gera caminhos para uma forma geométrica fixa (um círculo)
        // e um preenchimento genérico.
        // O comportamento está sendo mantido para ser fiel ao código-fonte fornecido.
        
        class AdvancedSlicer {
            constructor(mesh, config) {
                this.mesh = mesh; // O mesh NÃO É USADO, assim como no Java
                this.config = config;
            }
            
            slice() {
                let layers = [];
                
                // O código Java não usa os limites reais do mesh,
                // ele usa valores fixos ou calcula algo que não é usado.
                // A altura maxZ no Java é 50.
                const minZ = 0;
                const maxZ = MAX_MODEL_HEIGHT * parseFloat(intensitySlider.value); 
                
                let numLayers = Math.ceil((maxZ - minZ) / this.config.layerHeight);
                if (numLayers === 0) numLayers = 1;
                
                for (let i = 0; i < numLayers; i++) {
                    const z = minZ + (i * this.config.layerHeight);
                    const layer = {
                        number: i,
                        z: z,
                        perimeters: [],
                        infill: []
                    };
                    
                    // Gerar perímetros (simplificado, como no Java)
                    this.generatePerimeters(layer, z);
                    
                    // Gerar preenchimento (simplificado, como no Java)
                    this.generateInfill(layer, z);
                    
                    layers.push(layer);
                }
                
                return layers;
            }
            
            // Porta 1:1 do Java
            generatePerimeters(layer, z) {
                const radius = 40.0;
                const points = 36;
                for (let i = 0; i <= points; i++) {
                    const angle = 2 * Math.PI * i / points;
                    const x = radius * Math.cos(angle);
                    const y = radius * Math.sin(angle);
                    layer.perimeters.push({ x, y });
                }
            }
            
            // Porta 1:1 do Java
            generateInfill(layer, z) {
                switch (this.config.infillPattern) {
                    case "gyroid":
                        this.generateGyroidInfill(layer, z);
                        break;
                    case "hexagon":
                        this.generateHexagonInfill(layer, z);
                        break;
                    case "rectilinear":
                    default:
                        this.generateRectilinearInfill(layer, z);
                        break;
                }
            }
            
            generateRectilinearInfill(layer, z) {
                const spacing = 10.0 / (this.config.infillDensity / 100.0);
                for (let x = -35; x <= 35; x += spacing) {
                    layer.infill.push({ x: x, y: -35 });
                    layer.infill.push({ x: x, y: 35 });
                }
            }
            
            generateHexagonInfill(layer, z) {
                const spacing = 8.0 / (this.config.infillDensity / 100.0);
                let offset = false;
                for (let y = -30; y <= 30; y += spacing * 0.866) {
                    const startX = offset ? spacing / 2 : -35;
                    for (let x = startX; x <= 35; x += spacing) {
                        layer.infill.push({ x, y });
                    }
                    offset = !offset;
                }
            }
            
            generateGyroidInfill(layer, z) {
                const scale = 0.3 / (this.config.infillDensity / 100.0);
                for (let t = 0; t < 6 * Math.PI; t += 0.15) {
                    const x = 30 * Math.cos(t) * scale;
                    const y = 30 * Math.sin(2 * t) * scale;
                    layer.infill.push({ x, y });
                }
            }
        }

                    "M402", "G28 ; Home geral", "M400", "G29 V4 T ; Auto nivelamento", "M400",
                    `M104 S${this.config.firstLayerNozzleTemp} ; Aquecimento do bico 1a camada`,
                    `M140 S${this.config.firstLayerBedTemp} ; Aquecimento da mesa 1a camada`,
                    "G1 X150 Y150 Z0 ; Recolhe sonda", "G27 ; Vai para ponto de purga",
                    `M109 S${this.config.firstLayerNozzleTemp} ; Aguarda temperatura 1a camada`,
                    `M190 S${this.config.firstLayerBedTemp} ; Aguarda mesa 1a camada`,
                    "G92 E0 ; Reseta extrusor", "G1 E22.5 F1000.0 ; Purga de filamento",
                    "M117 Imprimindo PLA...", "M400", "", "; Configurações específicas PLA",
                    `M106 S${Math.floor(this.config.fanSpeed * 255 / 100)} ; Ventoinha PLA`
                ];
            }

            generatePETGStartGcode() {
                return [
                    `M109 S${this.config.nozzleTemp - 20} ; Pré-aquecimento do bico`,
                    "M402", "G28 ; Home geral", "M400", "G29 V4 T ; Auto nivelamento", "M400",
                    `M104 S${this.config.firstLayerNozzleTemp} ; Aquecimento do bico 1a camada`,
                    `M140 S${this.config.firstLayerBedTemp} ; Aquecimento da mesa 1a camada`,
                    "G1 X150 Y150 Z0 ; Recolhe sonda", "G27 ; Vai para ponto de purga",
                    `M109 S${this.config.firstLayerNozzleTemp} ; Aguarda temperatura 1a camada`,
                    `M190 S${this.config.firstLayerBedTemp} ; Aguarda mesa 1a camada`,
                    "G92 E0 ; Reseta extrusor", "G1 E22.5 F1000.0 ; Purga de filamento",
                    "M117 Imprimindo PETG...", "M400", "", "; Configurações específicas PETG",
                    `M106 S${Math.floor(this.config.fanSpeed * 255 / 100)} ; Ventoinha PETG`
                ];
            }
            
            generateTRITANStartGcode() {
                return [
                    `M109 S${this.config.nozzleTemp - 20} ; Pré-aquecimento do bico`,
                    "M402", "G28 ; Home geral", "M400", "G29 V4 T ; Auto nivelamento", "M400",
                    `M104 S${this.config.firstLayerNozzleTemp} ; Aquecimento do bico 1a camada`,
                    `M140 S${this.config.firstLayerBedTemp} ; Aquecimento da mesa 1a camada`,
                    "G1 X150 Y150 Z0 ; Recolhe sonda", "G27 ; Vai para ponto de purga",
                    `M109 S${this.config.firstLayerNozzleTemp} ; Aguarda temperatura 1a camada`,
                    `M190 S${this.config.firstLayerBedTemp} ; Aguarda mesa 1a camada`,
                    "G92 E0 ; Reseta extrusor", "G1 E22.5 F1000.0 ; Purga de filamento",
                    "M117 Imprimindo TRITAN...", "M400", "", "; Configurações específicas TRITAN",
                    `M106 S${Math.floor(this.config.fanSpeed * 255 / 100)} ; Ventoinha TRITAN`
                ];
            }

            generateEndGcode() {
                return [
                    `; Final da impressão - ${this.filamentType}`,
                    "M107 ; Desliga fan", "G91 ; Coordenadas relativas",
                    `G1 E-${this.config.retraction} F${this.config.retractionSpeed * 60} ; Retração final`,
                    "G1 Z5 F9000 ; Eleva o bico", "G90 ; Coordenadas absolutas",
                    "G1 X0 Y220 F3600 ; Posição de descanso", "M84 ; Desliga motores",
                    "M104 S0 ; Desliga bico", "M140 S0 ; Desliga mesa", "; Fim do G-code"
                ];
            }

            // Porta 1:1 do G-code por camada
            generateLayerGcode(layer) {
                let layerGcode = [];
                const z = layer.z.toFixed(2);
                
                if (layer.number === 0) {
                    layerGcode.push("; PRIMEIRA CAMADA - Configurações especiais");
                    layerGcode.push(`G1 Z${z} F1200`);
                    layerGcode.push(`M104 S${this.config.nozzleTemp} ; Temperatura normal do bico`);
                    layerGcode.push(`M140 S${this.config.bedTemp} ; Temperatura normal da mesa`);
                } else {
                    layerGcode.push(`G1 Z${z} F1200`);
                }
                
                if (layer.perimeters.length > 0) {
                    layerGcode.push("; PERIMETRO");
                    const first = layer.perimeters[0];
                    layerGcode.push(`G1 X${first.x.toFixed(2)} Y${first.y.toFixed(2)} F1800`);
                    
                    for (const point of layer.perimeters) {
                        layerGcode.push(`G1 X${point.x.toFixed(2)} Y${point.y.toFixed(2)} E0.4`); // Extrusão simplificada
                    }
                    layerGcode.push(`G1 X${first.x.toFixed(2)} Y${first.y.toFixed(2)}`);
                }
                
                if (layer.infill.length > 0) {
                    layerGcode.push("; PREENCHIMENTO");
                    let firstPoint = true;
                    for (const point of layer.infill) {
                        if (firstPoint) {
                            layerGcode.push(`G1 X${point.x.toFixed(2)} Y${point.y.toFixed(2)} F4800`);
                            firstPoint = false;
                        } else {
                            layerGcode.push(`G1 X${point.x.toFixed(2)} Y${point.y.toFixed(2)} E0.2`);
                        }
                    }
                }
                
                layerGcode.push("");
                return layerGcode;
            }
        }
        
        async function generateFinalGcode() {
            if (slicedLayers.length === 0) {
                updateStatus("Execute o fatiamento primeiro!");
                return;
            }

            updateStatus("Gerando G-code otimizado...");
            updateProgress(0.1);
            await sleep(50);
            
            try {
                const filamentType = filamentTypeCombo.value;
                const generator = new GCodeGenerator(slicedLayers, currentPrinterConfig, filamentType);
                const gcodeLines = generator.generate();
                
                previewFinalGcode(gcodeLines);
                updateProgress(0.8);
                
                const gcodeString = gcodeLines.join("\n");
                const filename = `modelo_gtmax_${filamentType.toLowerCase()}.gcode`;
                downloadFile(gcodeString, filename, "text/plain");
                
                updateProgress(1.0);
                updateStatus("G-code gerado com sucesso! Compatível com PrusaSlicer/GTMax H5");

            } catch (error) {
                updateStatus("Erro ao gerar G-code: " + error.message);
                console.error(error);
                updateProgress(0);
            }
        }
        
        function previewFinalGcode(fullGcode) {
            let preview = "";
            const previewLines = Math.min(30, fullGcode.length);

            for (let i = 0; i < previewLines; i++) {
                preview += fullGcode[i] + "\n";
            }
            
            if (fullGcode.length > previewLines) {
                preview += `; ... ${fullGcode.length - previewLines - 5} linhas omitidas ...\n`;
                for (let i = Math.max(0, fullGcode.length - 5); i < fullGcode.length; i++) {
                    preview += fullGcode[i] + "\n";
                }
            }
            
            gcodePreview.value = preview;
        }

        // =================================================================
        // MÉTODOS UTILITÁRIOS
        // =================================================================
        
        function updateStatus(message) {
            console.log("Status:", message);
            statusLabel.innerText = message;
        }
        
        function updateProgress(value) { // value 0.0 to 1.0
            progressBar.value = value;
        }
        
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function centerPivot(node) {
            // Em three.js, "center pivot" significa centralizar a geometria
            // e mover o objeto de malha.
            node.geometry.computeBoundingBox();
            const boundingBox = node.geometry.boundingBox;
            
            const center = new THREE.Vector3();
            boundingBox.getCenter(center);
            
            // Centraliza a geometria na origem
            node.geometry.translate(-center.x, -center.y, -center.z);
            
            // Reseta a posição do objeto de malha (se necessário, mas
            // o OrbitControls centraliza automaticamente).
            // Vamos resetar os controles para focar no novo centro.
            controls.target.copy(node.position);
            controls.update();
        }

        function calculateSurfaceNormal(v1, v2, v3) {
            // Portado do Java
            const u = new THREE.Vector3().subVectors(v2, v1);
            const v = new THREE.Vector3().subVectors(v3, v1);
            return new THREE.Vector3().crossVectors(u, v).normalize();
        }

        function downloadFile(content, fileName, mimeType = 'application/octet-stream') {
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // =================================================================
        // INICIAR A APLICAÇÃO
        // =================================================================
        
        initializeApp();

    </script>
