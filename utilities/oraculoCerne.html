  const shareButton = document.createElement("button");
  shareButton.className = "action-button";
  shareButton.innerHTML = '<i class="fas fa-share-alt"></i><span class="sr-only">Compartilhar</span>';
  shareButton.setAttribute("aria-label", "Compartilhar");
  shareButton.addEventListener("click", () => shareContent(cleanText));
  
  actionsDiv.appendChild(audioButton);
  actionsDiv.appendChild(shareButton);
  messageElement.appendChild(actionsDiv);
  
  document.getElementById("chat-container").appendChild(messageElement);
}

function renderMiniLesson(grounding) {
  if (!grounding || typeof grounding !== "object") {
      console.error("Tentativa de renderizar mini-lesson com grounding inválido:", grounding);
      return;
  }

  const container = document.getElementById("chat-container");

  const section = document.createElement("div");
  section.className = "mini-lesson";

  // Cabeçalho
  const headerDiv = document.createElement("div");
  headerDiv.className = "mini-lesson-header";

  const titleDiv = document.createElement("div");
  titleDiv.className = "mini-lesson-title";
  titleDiv.textContent = grounding.pratica;

  const idDiv = document.createElement("div");
  idDiv.className = "mini-lesson-id";
  idDiv.textContent = grounding.praticaId;

  headerDiv.appendChild(titleDiv);
  headerDiv.appendChild(idDiv);
  section.appendChild(headerDiv);

  // Função auxiliar para criar conteúdo
  const createContentElement = (label, content) => {
    if (!content) return null;
    const p = document.createElement('p');
    const strong = document.createElement('strong');
    strong.textContent = `${label}: `;
    p.appendChild(strong);

    if (typeof content === 'string' && content.trim().startsWith('•')) {
        const ul = document.createElement('ul');
        const items = content.split('•').map(item => item.trim()).filter(item => item);
        items.forEach(itemText => {
            const li = document.createElement('li');
            li.textContent = itemText;
            ul.appendChild(li);
        });
        p.appendChild(ul);
    } else {
        p.appendChild(document.createTextNode(content));
    }
    return p;
  };

  // Adiciona conteúdo
  ["descricao", "objetivo", "acoes", "metricas", "evidencias", "exemplos", "dicas"].forEach(field => {
    const el = createContentElement(field.charAt(0).toUpperCase() + field.slice(1), grounding[field]);
    if(el) section.appendChild(el);
  });

  // Montar texto para o áudio
  let textForAudio = `${grounding.pratica}\n`;
  if (grounding.descricao) textForAudio += `Descrição: ${grounding.descricao}\n`;
  if (grounding.objetivo) textForAudio += `Objetivo: ${grounding.objetivo}\n`;
  if (grounding.acoes) textForAudio += `Ações: ${grounding.acoes}\n`;
  if (grounding.metricas) textForAudio += `Métricas: ${grounding.metricas}\n`;
  if (grounding.evidencias) textForAudio += `Evidências: ${grounding.evidencias}\n`;
  if (grounding.exemplos) textForAudio += `Exemplos: ${grounding.exemplos}\n`;
  if (grounding.dicas) textForAudio += `Dicas: ${grounding.dicas}\n`;

  // Criar div para ações (botões)
  const actionsDiv = document.createElement("div");
  actionsDiv.className = "message-actions";

  // Botão de áudio
  const audioButton = document.createElement("button");
  audioButton.className = "action-button";
  audioButton.innerHTML = '<i class="fas fa-volume-up"></i><span class="sr-only">Ler em voz alta</span>';
  audioButton.setAttribute("aria-label", "Ler em voz alta");
  audioButton.addEventListener("click", () => speakText(textForAudio));

  // Opcional: botão compartilhar
  const shareButton = document.createElement("button");
  shareButton.className = "action-button";
  shareButton.innerHTML = '<i class="fas fa-share-alt"></i><span class="sr-only">Compartilhar</span>';
  shareButton.setAttribute("aria-label", "Compartilhar");
  shareButton.addEventListener("click", () => shareContent(textForAudio));
  actionsDiv.appendChild(shareButton);

  actionsDiv.appendChild(audioButton);
  section.appendChild(actionsDiv);

  container.appendChild(section);

  // Autoplay do áudio ao abrir a prática
  //speakText(textForAudio);
}

function renderQuiz(quiz, nodeId) {
  const quizContainer = document.createElement("div");
  quizContainer.className = "quiz-container";
  quizContainer.id = `quiz-${nodeId}`;
  
  const quizTitle = document.createElement("div");
  quizTitle.className = "quiz-title";
  quizTitle.innerHTML = '<i class="fas fa-question-circle"></i> Quiz: Teste seu conhecimento';
  
  const quizQuestion = document.createElement("div");
  quizQuestion.className = "quiz-question";
  quizQuestion.textContent = quiz.question;
  
  const quizOptions = document.createElement("div");
  quizOptions.className = "quiz-options";
  
  // Criar opções do quiz
  quiz.options.forEach((option, index) => {
    const optionElement = document.createElement("div");
    optionElement.className = "quiz-option";
    optionElement.tabIndex = 0;
    optionElement.dataset.index = index;
    optionElement.setAttribute("role", "button"); // Melhor para acessibilidade
    
    const marker = document.createElement("div");
    marker.className = "quiz-option-marker";
    marker.textContent = String.fromCharCode(65 + index); // A, B, C, D...
    
    const optionText = document.createElement("div");
    optionText.textContent = option;
    
    optionElement.appendChild(marker);
    optionElement.appendChild(optionText);
    
    // Adicionar evento de clique
    optionElement.addEventListener("click", () => handleQuizAnswer(nodeId, index));
    optionElement.addEventListener("keypress", (e) => {
      if (e.key === "Enter" || e.key === " ") handleQuizAnswer(nodeId, index);
    });
    
    quizOptions.appendChild(optionElement);
  });
  
  // Feedback do quiz (inicialmente oculto)
  const quizFeedback = document.createElement("div");
  quizFeedback.className = "quiz-feedback";
  quizFeedback.id = `quiz-feedback-${nodeId}`;
  
  quizContainer.appendChild(quizTitle);
  quizContainer.appendChild(quizQuestion);
  quizContainer.appendChild(quizOptions);
  quizContainer.appendChild(quizFeedback);
  
  document.getElementById("chat-container").appendChild(quizContainer);
}

function renderOptions(options) {
  const buttonsContainer = document.getElementById("buttons-container");
  // Não limpar aqui, pois renderHomeButton também adiciona botões

  options.forEach(option => {
    const button = document.createElement("button");
    button.className = "button";
    button.innerHTML = option.text; // Usar innerHTML para ícones
    button.addEventListener("click", () => navigateTo(option.next));
    buttonsContainer.appendChild(button);
  });
}

function renderHomeButton() {
  const buttonsContainer = document.getElementById("buttons-container");
  // Limpar apenas botões de voltar/início existentes para evitar duplicação
  const existingHomeButtons = buttonsContainer.querySelectorAll('.button.home, .button.secondary');
  existingHomeButtons.forEach(btn => btn.remove());

  // Adicionar botão de voltar se houver histórico
  if (breadcrumbHistory.length > 1) {
    const previousNodeId = breadcrumbHistory[breadcrumbHistory.length - 2].id;
    const backButton = document.createElement("button");
    backButton.className = "button secondary";
    backButton.innerHTML = '<i class="fas fa-arrow-left"></i> Voltar';
    backButton.addEventListener("click", () => navigateTo(previousNodeId));
    // Adiciona o botão Voltar antes dos botões de opção
    if (buttonsContainer.firstChild) {
        buttonsContainer.insertBefore(backButton, buttonsContainer.firstChild);
    } else {
        buttonsContainer.appendChild(backButton);
    }
  }
  
  // Adicionar botão de início (se não estiver no início)
  if (currentNode !== 'start') {
      const homeButton = document.createElement("button");
      homeButton.className = "button home";
      homeButton.innerHTML = '<i class="fas fa-home"></i> Início';
      homeButton.addEventListener("click", () => navigateTo("start"));
      // Adiciona o botão Início antes do Voltar (se existir) ou no início
      if (buttonsContainer.firstChild && buttonsContainer.firstChild.classList.contains('secondary')) {
          buttonsContainer.insertBefore(homeButton, buttonsContainer.firstChild);
      } else if (buttonsContainer.firstChild) {
          buttonsContainer.insertBefore(homeButton, buttonsContainer.firstChild);
      } else {
          buttonsContainer.appendChild(homeButton);
      }
  }
}

/* ====== Funções de Interação ====== */
function handleQuizAnswer(nodeId, selectedIndex) {
  const quiz = quizzes[nodeId];
  if (!quiz) return;
  
  // Obter elementos do quiz
  const quizContainer = document.getElementById(`quiz-${nodeId}`);
  const options = quizContainer.querySelectorAll(".quiz-option");
  const feedback = document.getElementById(`quiz-feedback-${nodeId}`);
  
  // Evitar responder novamente
  if (quizContainer.dataset.answered === 'true') return;
  quizContainer.dataset.answered = 'true';

  // Desabilitar todas as opções
  options.forEach(option => {
    option.style.pointerEvents = "none";
    option.setAttribute("aria-disabled", "true"); // Acessibilidade
  });
  
  // Marcar a opção selecionada
  options[selectedIndex].classList.add("selected");
  options[selectedIndex].setAttribute("aria-pressed", "true"); // Acessibilidade
  
  // Verificar se a resposta está correta
  const isCorrect = selectedIndex === quiz.correctAnswer;
  
  // Atualizar estatísticas do usuário
  userProgress.quizzesCompleted++;
  if (isCorrect) {
    userProgress.quizzesCorrect++;
    userProgress.consecutiveCorrect++;
  } else {
    userProgress.consecutiveCorrect = 0;
  }
  
  // Verificar conquistas
  checkAchievements();
  
  // Mostrar feedback
  setTimeout(() => {
    // Marcar a resposta correta e incorreta
    options.forEach((option, index) => {
      if (index === quiz.correctAnswer) {
        option.classList.add("correct");
      } else if (index === selectedIndex) { // Apenas a selecionada se incorreta
        option.classList.add("incorrect");
      }
    });
    
    // Mostrar mensagem de feedback
    feedback.innerHTML = isCorrect 
      ? `✅ <strong>Correto!</strong> ${quiz.explanation}` 
      : `❌ <strong>Incorreto.</strong> ${quiz.explanation}`;
    feedback.classList.add(isCorrect ? "correct" : "incorrect");
    feedback.style.display = 'block'; // Garantir que está visível
    
    // Reproduzir som de feedback
    playFeedbackSound(isCorrect);
    
    // Atualizar barra de progresso
    updateProgressBar();
  }, 500);
}

function handleSearch() {
  const searchInput = document.getElementById("search-input");
  const searchTerm = searchInput.value.trim().toLowerCase();
  
  if (searchTerm.length < 2) {
    alert("Por favor, digite pelo menos 2 caracteres para pesquisar.");
    return;
  }
  
  // Pesquisar nos groundings
  const results = [];
  
  for (const [nodeId, grounding] of Object.entries(groundings)) {
    // Verificar se o termo de pesquisa está presente em algum campo do grounding
    const searchableText = `${grounding.praticaId} ${grounding.pratica} ${grounding.descricao} ${grounding.objetivo} ${grounding.acoes} ${grounding.exemplos} ${grounding.dicas}`.toLowerCase();
    
    if (searchableText.includes(searchTerm)) {
      results.push({
        nodeId,
        pratica: grounding.pratica,
        praticaId: grounding.praticaId,
        relevance: calculateRelevance(searchTerm, searchableText)
      });
    }
  }
  
  // Ordenar resultados por relevância
  results.sort((a, b) => b.relevance - a.relevance);
  
  // Exibir resultados
  displaySearchResults(results, searchTerm);
}

function calculateRelevance(searchTerm, text) {
  // Cálculo simples de relevância baseado no número de ocorrências
  const occurrences = (text.match(new RegExp(searchTerm.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&'), 'gi')) || []).length;
  
  // Bônus se o termo estiver no início do texto ou prática
  const startsWithBonus = text.startsWith(searchTerm) ? 5 : 0;
  const practiceMatchBonus = text.toLowerCase().startsWith(searchTerm.toLowerCase()) ? 10 : 0;

  return occurrences + startsWithBonus + practiceMatchBonus;
}

function displaySearchResults(results, searchTerm) {
  clearContainers();
  
  // Renderizar o robô
  renderRobot();
  
  // Renderizar mensagem de resultados
  const messageText = results.length > 0
    ? `🔍 Encontrei ${results.length} resultado(s) para "<strong>${searchTerm}</strong>". Clique em um resultado para explorar:`
    : `🔍 Não encontrei resultados para "<strong>${searchTerm}</strong>". Tente outros termos ou explore os tópicos disponíveis.`;
  
  renderMessage(messageText);
  
  // Renderizar resultados como botões
  const buttonsContainer = document.getElementById("buttons-container");
  
  results.forEach(result => {
    const button = document.createElement("button");
    button.className = "button";
    // Usar innerHTML para destacar o termo pesquisado se necessário (opcional)
    button.innerHTML = `${result.praticaId} - ${result.pratica}`;
    button.addEventListener("click", () => navigateTo(result.nodeId));
    buttonsContainer.appendChild(button);
  });
  
  // Adicionar botão de voltar ao início
  renderHomeButton(); // Reutiliza a função para adicionar botão Início
}

function speakText(text) {
  if ('speechSynthesis' in window) {
    speechSynthesis.cancel(); // Cancela falas anteriores
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'pt-BR';
    speechSynthesis.speak(utterance);
  } else {
    alert("Desculpe, seu navegador não suporta a funcionalidade de leitura de texto.");
  }
}

function shareContent(text) {
  if (navigator.share) {
    navigator.share({
      title: 'CerneOracle - O guardião da sabedoria do modelo CERNE',
      text: text
    })
    .catch(error => console.log('Erro ao compartilhar:', error));
  } else {
    // Fallback para copiar para área de transferência
    navigator.clipboard.writeText(text).then(() => {
      alert("Conteúdo copiado para a área de transferência!");
    }).catch(err => {
      console.error('Erro ao copiar texto: ', err);
      alert("Não foi possível copiar o conteúdo.");
    });
  }
}

function toggleDarkMode() {
  const body = document.body;
  const darkModeToggle = document.getElementById("dark-mode-toggle");
  
  body.classList.toggle("dark-mode");
  
  if (body.classList.contains("dark-mode")) {
    localStorage.setItem("darkMode", "enabled");
    darkModeToggle.innerHTML = '<i class="fas fa-sun"></i>';
    darkModeToggle.setAttribute("aria-label", "Alternar para modo claro");
  } else {
    localStorage.setItem("darkMode", "disabled");
    darkModeToggle.innerHTML = '<i class="fas fa-moon"></i>';
    darkModeToggle.setAttribute("aria-label", "Alternar para modo escuro");
  }
}

/* ====== Funções de Gamificação ====== */
function updateProgressBar() {
  // Calcular progresso baseado no número de nós visitados (excluindo nós de nível como 'cerne1')
  const totalPracticeNodes = Object.keys(groundings).length;
  const visitedPracticeNodes = Array.from(visitedNodes).filter(nodeId => groundings[nodeId]).length;
  const progress = totalPracticeNodes > 0 ? Math.min(100, (visitedPracticeNodes / totalPracticeNodes) * 100) : 0;
  
  // Atualizar a barra de progresso
  const progressBar = document.getElementById("progress-bar");
  progressBar.style.width = `${progress}%`;
}

function checkAchievements() {
  let newAchievementUnlocked = false;

  // Explorador Iniciante
  if (userProgress.totalVisited > 1 && !userProgress.earnedAchievements.has("explorador_iniciante")) {
    if (unlockAchievement("explorador_iniciante")) newAchievementUnlocked = true;
  }

  // Conhecedor Cerne 1
  const cerne1VisitedCount = Array.from(visitedNodes).filter(node => node.startsWith("cerne1_")).length;
  if (cerne1VisitedCount >= 5 && !userProgress.earnedAchievements.has("conhecedor_cerne1")) {
    if (unlockAchievement("conhecedor_cerne1")) newAchievementUnlocked = true;
  }

  // Conhecedor Cerne 2
  const cerne2VisitedCount = Array.from(visitedNodes).filter(node => node.startsWith("cerne2_")).length;
  if (cerne2VisitedCount >= 5 && !userProgress.earnedAchievements.has("conhecedor_cerne2")) {
    if (unlockAchievement("conhecedor_cerne2")) newAchievementUnlocked = true;
  }

  // Conhecedor Cerne 3
  const cerne3VisitedCount = Array.from(visitedNodes).filter(node => node.startsWith("cerne3_")).length;
  if (cerne3VisitedCount >= 5 && !userProgress.earnedAchievements.has("conhecedor_cerne3")) {
    if (unlockAchievement("conhecedor_cerne3")) newAchievementUnlocked = true;
  }

  // Conhecedor Cerne 4
  const cerne4VisitedCount = Array.from(visitedNodes).filter(node => node.startsWith("cerne4_")).length;
  if (cerne4VisitedCount >= 5 && !userProgress.earnedAchievements.has("conhecedor_cerne4")) {
    if (unlockAchievement("conhecedor_cerne4")) newAchievementUnlocked = true;
  }

  // Boss Cerne 2 (precisa conhecer Cerne 1)
  if (
    userProgress.earnedAchievements.has("conhecedor_cerne1") &&
    userProgress.earnedAchievements.has("conhecedor_cerne2") &&
    !userProgress.earnedAchievements.has("boss_cerne2")
  ) {
    if (unlockAchievement("boss_cerne2")) newAchievementUnlocked = true;
  }

  // Boss Cerne 3 (precisa conhecer Cerne 1 e 2)
  if (
    userProgress.earnedAchievements.has("boss_cerne2") &&
    userProgress.earnedAchievements.has("conhecedor_cerne3") &&
    !userProgress.earnedAchievements.has("boss_cerne3")
  ) {
    if (unlockAchievement("boss_cerne3")) newAchievementUnlocked = true;
  }

  // Boss Cerne 4 (precisa conhecer Cerne 1, 2 e 3)
  if (
    userProgress.earnedAchievements.has("boss_cerne3") &&
    userProgress.earnedAchievements.has("conhecedor_cerne4") &&
    !userProgress.earnedAchievements.has("boss_cerne4")
  ) {
    if (unlockAchievement("boss_cerne4")) newAchievementUnlocked = true;
  }

  // Mestre dos Quizzes
  if (userProgress.consecutiveCorrect >= 3 && !userProgress.earnedAchievements.has("mestre_quiz")) {
    if (unlockAchievement("mestre_quiz")) newAchievementUnlocked = true;
  }

  // Explorador Completo
  const visitedCerneLevels = new Set();
  visitedNodes.forEach(nodeId => {
    if (nodeId.startsWith("cerne") && nodeId.includes('_')) {
      const levelMatch = nodeId.match(/^cerne(\d+)/);
      if (levelMatch) {
        visitedCerneLevels.add(parseInt(levelMatch[1], 10));
      }
    }
  });
  if (visitedCerneLevels.size >= 4 && !userProgress.earnedAchievements.has("explorador_completo")) {
    if (unlockAchievement("explorador_completo")) newAchievementUnlocked = true;
  }

  // Salvar progresso se nova conquista foi desbloqueada
  // if (newAchievementUnlocked) { saveProgress(); }
}

function unlockAchievement(achievementId) {
  if (userProgress.earnedAchievements.has(achievementId)) return false; // Já conquistado

  const achievement = achievements[achievementId];
  if (!achievement) return false; // Conquista não existe
  
  // Marcar como conquistado
  userProgress.earnedAchievements.add(achievementId);
  
  // Atualizar o elemento de conquista
  const achievementElement = document.getElementById("achievement");
  const achievementName = document.getElementById("achievement-name");
  const achievementIcon = achievementElement.querySelector(".achievement-icon i");
  
  achievementName.textContent = achievement.name;
  achievementIcon.className = achievement.icon; // Define o ícone correto
  
  // Mostrar a conquista
  achievementElement.classList.add("show");
  
  // Reproduzir som de conquista
  playAchievementSound();
  
  // Esconder após alguns segundos
  setTimeout(() => {
    achievementElement.classList.remove("show");
  }, 5000);

  console.log(`Conquista desbloqueada: ${achievement.name}`);
  return true;
}

/* ====== Funções de Áudio ====== */
function playFeedbackSound(isCorrect) {
  try {
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioContext.createOscillator();
    const gainNode = audioContext.createGain();
    oscillator.connect(gainNode);
    gainNode.connect(audioContext.destination);
    oscillator.type = 'sine';
    gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
    if (isCorrect) {
      // Som de acerto (ex: nota mais alta)
      oscillator.frequency.setValueAtTime(880, audioContext.currentTime); // A5
      gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.3);
    } else {
      // Som de erro (ex: nota mais baixa)
      oscillator.frequency.setValueAtTime(440, audioContext.currentTime); // A4
      gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.4);
    }
    oscillator.start(audioContext.currentTime);
    oscillator.stop(audioContext.currentTime + 0.4);
  } catch (e) {
    console.warn("Erro ao reproduzir som de feedback:", e);
  }
}

function playAchievementSound() {
   try {
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioContext.createOscillator();
    const gainNode = audioContext.createGain();
    oscillator.connect(gainNode);
    gainNode.connect(audioContext.destination);
    oscillator.type = 'triangle';
    gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
    // Sequência de notas ascendente simples
    oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime); // C5
    oscillator.frequency.linearRampToValueAtTime(659.25, audioContext.currentTime + 0.1); // E5
    oscillator.frequency.linearRampToValueAtTime(783.99, audioContext.currentTime + 0.2); // G5
    oscillator.frequency.linearRampToValueAtTime(1046.50, audioContext.currentTime + 0.3); // C6
    gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.5);
    oscillator.start(audioContext.currentTime);
    oscillator.stop(audioContext.currentTime + 0.5);
  } catch (e) {
    console.warn("Erro ao reproduzir som de conquista:", e);
  }
}
