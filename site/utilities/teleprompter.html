<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINI PROMPTER</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #eee;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }
        
        .control-panel {
            width: 60px;
            background-color: #000;
            display: flex;
            flex-direction: column;
            padding: 15px 10px;
            gap: 15px;
            z-index: 100;
        }
        
        .ctrl-btn {
            width: 40px;
            height: 40px;
            background-color: #222;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .ctrl-btn:hover {
            background-color: #333;
        }
        
        .ctrl-btn.active {
            background-color: #444;
        }
        
        .speed-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        
        .speed-value {
            color: #aaa;
            font-size: 12px;
            font-family: monospace;
        }
        
        .text-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow: hidden;
            position: relative;
            padding-top: 20vh;
        }
        
        #prompter-text {
            font-size: 3.5rem;
            line-height: 1.5;
            text-align: center;
            width: 80%;
            max-width: 900px;
            transform: translateY(0);
            transition: transform 0.1s linear;
        }
        
        #script-input {
            position: fixed;
            bottom: 0;
            left: 60px;
            right: 0;
            height: 80px;
            padding: 12px;
            background-color: #000;
            color: #eee;
            border: none;
            border-top: 1px solid #333;
            resize: none;
            font-family: inherit;
            font-size: 14px;
        }
        
        #script-input:focus {
            outline: none;
            border-top: 1px solid #555;
        }
        
        @media (max-width: 768px) {
            #prompter-text {
                font-size: 2.2rem;
                width: 90%;
            }
            .text-container {
                padding-top: 10vh;
            }
        }
    </style>
</head>
<body>
    <div class="control-panel">
        <button class="ctrl-btn" id="play-btn">▶</button>
        <button class="ctrl-btn" id="pause-btn">⏸</button>
        <button class="ctrl-btn" id="rewind-btn">⏮</button>
        
        <div class="speed-container">
            <button class="ctrl-btn" id="faster-btn">+</button>
            <div class="speed-value" id="speed-value">1.0x</div>
            <button class="ctrl-btn" id="slower-btn">-</button>
        </div>
    </div>
    
    <div class="text-container">
        <div id="prompter-text">
            MINIMAL TELEPROMPTER READY<br><br>
            Paste your script below<br><br>
            ▶ Play | ⏸ Pause | ⏮ Rewind<br><br>
            +/- Adjust speed in real-time
        </div>
    </div>
    
    <textarea id="script-input" placeholder="Paste your script here..."></textarea>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Elements
            const textEl = document.getElementById('prompter-text');
            const inputEl = document.getElementById('script-input');
            const playBtn = document.getElementById('play-btn');
            const pauseBtn = document.getElementById('pause-btn');
            const rewindBtn = document.getElementById('rewind-btn');
            const slowerBtn = document.getElementById('slower-btn');
            const fasterBtn = document.getElementById('faster-btn');
            const speedValue = document.getElementById('speed-value');
            
            // State
            let isPlaying = false;
            let scrollPos = 0;
            let scrollInterval;
            let speed = 1.0; // Base speed (1.0x)
            const minSpeed = 0.1;
            const maxSpeed = 3.0;
            const speedStep = 0.1;
            
            // Initialize
            updateSpeedDisplay();
            centerInitialText();
            
            // Play/Pause
            playBtn.addEventListener('click', startScrolling);
            pauseBtn.addEventListener('click', pauseScrolling);
            
            // Rewind
            rewindBtn.addEventListener('click', function() {
                scrollPos = 0;
                updateTextPosition();
            });
            
            // Speed controls (real-time adjustment)
            slowerBtn.addEventListener('click', function() {
                speed = Math.max(minSpeed, speed - speedStep);
                updateSpeedDisplay();
            });
            
            fasterBtn.addEventListener('click', function() {
                speed = Math.min(maxSpeed, speed + speedStep);
                updateSpeedDisplay();
            });
            
            // Script input
            inputEl.addEventListener('input', function() {
                textEl.innerHTML = this.value.replace(/\n/g, '<br>');
                scrollPos = 0;
                updateTextPosition();
            });
            
            // Keyboard controls
            document.addEventListener('keydown', function(e) {
                if (e.code === 'Space') {
                    e.preventDefault();
                    if (isPlaying) pauseScrolling();
                    else startScrolling();
                }
                if (e.code === 'ArrowUp') fasterBtn.click();
                if (e.code === 'ArrowDown') slowerBtn.click();
                if (e.code === 'Home') rewindBtn.click();
            });
            
            // Window resize handler
            window.addEventListener('resize', centerInitialText);
            
            // Functions
            function startScrolling() {
                if (isPlaying) return;
                isPlaying = true;
                let lastTime = performance.now();
                
                function scrollFrame(timestamp) {
                    if (!isPlaying) return;
                    
                    const deltaTime = timestamp - lastTime;
                    lastTime = timestamp;
                    
                    // Smooth scrolling with time-based movement
                    scrollPos -= speed * (deltaTime / 16); // Normalized to 60fps
                    updateTextPosition();
                    
                    // Check if we've scrolled past all content
                    const container = document.querySelector('.text-container');
                    if (-scrollPos > textEl.offsetHeight + container.offsetHeight) {
                        pauseScrolling();
                        return;
                    }
                    
                    requestAnimationFrame(scrollFrame);
                }
                
                requestAnimationFrame(scrollFrame);
            }
            
            function pauseScrolling() {
                isPlaying = false;
            }
            
            function updateTextPosition() {
                textEl.style.transform = `translateY(${scrollPos}px)`;
            }
            
            function updateSpeedDisplay() {
                speedValue.textContent = speed.toFixed(1) + 'x';
            }
            
            function centerInitialText() {
                const container = document.querySelector('.text-container');
                const textHeight = textEl.offsetHeight;
                const containerHeight = container.offsetHeight;
                
                // Only center if not playing and at start position
                if (!isPlaying && scrollPos === 0) {
                    const initialOffset = (containerHeight - textHeight) / 2;
                    textEl.style.transform = `translateY(${Math.max(0, initialOffset)}px)`;
                }
            }
        });
    </script>

</body>
</html>
