<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="CerneOracle — guia interativo do Modelo CERNE para incubadoras de inovação. Explore práticas, quizzes e conquistas dos 4 níveis do modelo." />
<meta name="keywords" content="CERNE, incubadora, inovação, empreendedorismo, modelo de gestão, quiz" />
<meta name="author" content="Rafael Passos Domingues" />
<meta name="theme-color" content="#4f46e5" />
<title>CerneOracle — Guardião do Modelo CERNE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
  /* ====== Design Tokens ====== */
  :root {
    --primary:        #4f46e5;
    --primary-dark:   #3730a3;
    --primary-light:  #e0e7ff;
    --accent:         #f59e0b;
    --accent-dark:    #b45309;
    --success:        #10b981;
    --danger:         #ef4444;
    --bg:             #f1f5f9;
    --surface:        #ffffff;
    --surface-2:      #f8fafc;
    --border:         #e2e8f0;
    --text:           #1e293b;
    --text-2:         #64748b;
    --shadow-sm:      0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
    --shadow-md:      0 4px 12px rgba(0,0,0,.10);
    --shadow-lg:      0 10px 30px rgba(0,0,0,.13);
    --radius-sm:      8px;
    --radius-md:      14px;
    --radius-lg:      20px;
    --transition:     0.25s ease;
    --font:           'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    /* level colors */
    --c1: #22c55e; --c1-bg: #dcfce7;
    --c2: #3b82f6; --c2-bg: #dbeafe;
    --c3: #a855f7; --c3-bg: #f3e8ff;
    --c4: #f97316; --c4-bg: #ffedd5;
  }

  [data-theme="dark"] {
    --primary:        #818cf8;
    --primary-dark:   #6366f1;
    --primary-light:  #1e1b4b;
    --accent:         #fbbf24;
    --accent-dark:    #d97706;
    --bg:             #0f172a;
    --surface:        #1e293b;
    --surface-2:      #162032;
    --border:         #334155;
    --text:           #e2e8f0;
    --text-2:         #94a3b8;
    --shadow-sm:      0 1px 3px rgba(0,0,0,.3);
    --shadow-md:      0 4px 12px rgba(0,0,0,.4);
    --shadow-lg:      0 10px 30px rgba(0,0,0,.5);
    --c1-bg: #14532d; --c2-bg: #1e3a5f; --c3-bg: #3b0764; --c4-bg: #431407;
  }

  /* ====== Reset ====== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 1.6;
    transition: background var(--transition), color var(--transition);
  }

  /* ====== Header ====== */
  header {
    width: 100%;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: #fff;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-md);
  }

  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: .9rem 1.25rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: .6rem;
    font-weight: 800;
    font-size: 1.3rem;
    letter-spacing: -.02em;
  }

  .logo i { font-size: 1.5rem; }

  .header-controls {
    display: flex;
    align-items: center;
    gap: .5rem;
  }

  .icon-btn {
    background: rgba(255,255,255,.15);
    border: 1px solid rgba(255,255,255,.2);
    color: #fff;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    transition: background var(--transition), transform var(--transition);
  }

  .icon-btn:hover { background: rgba(255,255,255,.28); transform: scale(1.08); }
  .icon-btn:focus-visible { outline: 3px solid rgba(255,255,255,.6); outline-offset: 2px; }

  /* Progress bar */
  .progress-wrap {
    width: 100%;
    background: rgba(255,255,255,.2);
    height: 4px;
  }

  #progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width .6s cubic-bezier(.4,0,.2,1);
  }

  /* ====== Main Container ====== */
  #main-container {
    width: 100%;
    max-width: 800px;
    padding: 1.5rem 1rem 2rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  /* ====== Nav Bar (breadcrumb + search) ====== */
  .nav-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: .75rem;
    flex-wrap: wrap;
  }

  .breadcrumb {
    display: flex;
    align-items: center;
    gap: .4rem;
    font-size: .85rem;
    color: var(--text-2);
    flex-wrap: wrap;
  }

  .breadcrumb span {
    cursor: pointer;
    border-radius: 6px;
    padding: .1rem .35rem;
    transition: background var(--transition), color var(--transition);
  }

  .breadcrumb span:hover, .breadcrumb span:focus-visible {
    background: var(--primary-light);
    color: var(--primary);
    outline: none;
  }

  .breadcrumb i { font-size: .65rem; color: var(--border); }

  .search-wrap {
    position: relative;
    min-width: 200px;
  }

  .search-wrap input {
    width: 100%;
    padding: .55rem 2.8rem .55rem 2.2rem;
    border: 1.5px solid var(--border);
    border-radius: 50px;
    font-size: .9rem;
    font-family: var(--font);
    background: var(--surface);
    color: var(--text);
    transition: border-color var(--transition), box-shadow var(--transition);
  }

  .search-wrap input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-light);
  }

  .search-wrap .search-icon-left {
    position: absolute;
    left: .75rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-2);
    font-size: .85rem;
    pointer-events: none;
  }

  .search-wrap .search-clear {
    position: absolute;
    right: .65rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-2);
    cursor: pointer;
    font-size: .85rem;
    display: none;
  }

  .search-wrap input:not(:placeholder-shown) ~ .search-clear { display: block; }

  /* ====== Chat Container ====== */
  #chat-container {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    box-shadow: var(--shadow-md);
    display: flex;
    flex-direction: column;
    gap: 1rem;
    min-height: 200px;
    border: 1px solid var(--border);
  }

  /* ====== Robot ====== */
  .robot {
    font-size: 2.6rem;
    align-self: flex-start;
    animation: robotEntry .4s cubic-bezier(.34,1.56,.64,1) forwards;
  }

  @keyframes robotEntry {
    from { opacity:0; transform: scale(.5) translateY(-8px); }
    to   { opacity:1; transform: scale(1) translateY(0); }
  }

  /* ====== Message ====== */
  .message {
    background: linear-gradient(135deg, var(--primary-light), #e0e7ff55);
    border: 1px solid rgba(99,102,241,.15);
    padding: 1rem 1.25rem;
    border-radius: var(--radius-md);
    font-size: .97rem;
    animation: fadeUp .35s ease forwards;
    position: relative;
  }

  [data-theme="dark"] .message {
    background: linear-gradient(135deg, #1e1b4b, #1e293b);
    border-color: rgba(129,140,248,.2);
  }

  .message-actions {
    display: flex;
    gap: .4rem;
    margin-top: .75rem;
  }

  .action-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-2);
    cursor: pointer;
    font-size: .8rem;
    padding: .3rem .6rem;
    border-radius: 6px;
    display: flex;
    align-items: center;
    gap: .3rem;
    transition: background var(--transition), color var(--transition);
  }

  .action-btn:hover { background: var(--primary-light); color: var(--primary); }

  /* ====== Mini Lesson ====== */
  .mini-lesson {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent);
    border-radius: var(--radius-md);
    padding: 1.25rem;
    animation: fadeUp .4s ease forwards;
    position: relative;
  }

  .mini-lesson-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: .5rem;
    margin-bottom: .9rem;
    padding-bottom: .75rem;
    border-bottom: 1px solid var(--border);
  }

  .mini-lesson-title {
    font-weight: 700;
    font-size: 1.05rem;
    color: var(--text);
  }

  .level-badge {
    display: inline-flex;
    align-items: center;
    gap: .3rem;
    padding: .2rem .6rem;
    border-radius: 50px;
    font-size: .75rem;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .level-1 { background: var(--c1-bg); color: var(--c1); }
  .level-2 { background: var(--c2-bg); color: var(--c2); }
  .level-3 { background: var(--c3-bg); color: var(--c3); }
  .level-4 { background: var(--c4-bg); color: var(--c4); }

  .mini-lesson p { margin: .4rem 0 .7rem; font-size: .93rem; }
  .mini-lesson strong { color: var(--text); }

  .mini-lesson ul {
    padding-left: 1.25rem;
    margin: .3rem 0 .6rem;
  }

  .mini-lesson ul li { margin-bottom: .25rem; font-size: .9rem; }

  /* ====== Quiz ====== */
  .quiz-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 4px solid var(--primary);
    border-radius: var(--radius-md);
    padding: 1.25rem;
    animation: fadeUp .45s ease forwards;
  }

  .quiz-title {
    font-weight: 700;
    font-size: 1rem;
    color: var(--primary);
    margin-bottom: .8rem;
    display: flex;
    align-items: center;
    gap: .4rem;
  }

  .quiz-question { margin-bottom: 1rem; font-size: .95rem; line-height: 1.5; }

  .quiz-options { display: flex; flex-direction: column; gap: .6rem; }

  .quiz-option {
    background: var(--surface-2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: .75rem 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: .75rem;
    transition: border-color var(--transition), background var(--transition), transform var(--transition);
    font-size: .92rem;
  }

  .quiz-option:hover  { border-color: var(--primary); transform: translateX(4px); }
  .quiz-option:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
  .quiz-option.correct   { border-color: var(--success); background: #ecfdf5; }
  .quiz-option.incorrect { border-color: var(--danger);  background: #fef2f2; }

  [data-theme="dark"] .quiz-option.correct   { background: #064e3b; }
  [data-theme="dark"] .quiz-option.incorrect { background: #450a0a; }

  .quiz-marker {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: .78rem; font-weight: 700;
    color: var(--text-2);
    flex-shrink: 0;
    transition: background var(--transition), border-color var(--transition), color var(--transition);
  }

  .quiz-option.correct   .quiz-marker { border-color: var(--success); background: var(--success); color: #fff; }
  .quiz-option.incorrect .quiz-marker { border-color: var(--danger);  background: var(--danger);  color: #fff; }

  .quiz-feedback {
    margin-top: 1rem;
    padding: .9rem 1rem;
    border-radius: var(--radius-sm);
    font-size: .92rem;
    display: none;
    line-height: 1.5;
  }

  .quiz-feedback.correct   { display: block; background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; }
  .quiz-feedback.incorrect { display: block; background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }
  [data-theme="dark"] .quiz-feedback.correct   { background: #064e3b; color: #6ee7b7; }
  [data-theme="dark"] .quiz-feedback.incorrect { background: #450a0a; color: #fca5a5; }

  /* ====== Buttons ====== */
  #buttons-container {
    display: flex;
    flex-wrap: wrap;
    gap: .6rem;
    justify-content: center;
  }

  .btn {
    border: none;
    padding: .65rem 1.2rem;
    border-radius: 50px;
    cursor: pointer;
    font-weight: 600;
    font-size: .9rem;
    font-family: var(--font);
    display: inline-flex;
    align-items: center;
    gap: .45rem;
    transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
  }

  .btn:hover     { transform: translateY(-2px); }
  .btn:active    { transform: translateY(0); }
  .btn:focus-visible { outline: 3px solid var(--primary-light); outline-offset: 2px; }

  .btn-primary {
    background: var(--primary);
    color: #fff;
    box-shadow: 0 4px 14px rgba(79,70,229,.35);
  }
  .btn-primary:hover { background: var(--primary-dark); box-shadow: 0 6px 20px rgba(79,70,229,.45); }

  .btn-secondary {
    background: var(--surface);
    color: var(--primary);
    border: 1.5px solid var(--primary);
  }
  .btn-secondary:hover { background: var(--primary-light); }

  .btn-home {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 14px rgba(245,158,11,.35);
  }
  .btn-home:hover { background: var(--accent-dark); }

  .btn-c1 { background: var(--c1); color: #fff; }
  .btn-c2 { background: var(--c2); color: #fff; }
  .btn-c3 { background: var(--c3); color: #fff; }
  .btn-c4 { background: var(--c4); color: #fff; }

  /* ====== Achievement toast ====== */
  .achievement {
    position: fixed;
    top: 1.5rem;
    right: -360px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 5px solid var(--success);
    padding: 1rem 1.25rem;
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-lg);
    display: flex;
    align-items: center;
    gap: .9rem;
    z-index: 1000;
    max-width: 320px;
    transition: right .5s cubic-bezier(.34,1.56,.64,1);
  }

  .achievement.show { right: 1.5rem; }

  .achievement-icon { font-size: 1.8rem; color: var(--success); flex-shrink: 0; }
  .achievement-content h3 { font-size: .95rem; color: var(--success); margin-bottom: .15rem; }
  .achievement-content p { font-size: .83rem; color: var(--text-2); }

  /* ====== Search Results ====== */
  .search-results-info {
    font-size: .85rem;
    color: var(--text-2);
    padding: .5rem 0;
    font-style: italic;
  }

  .result-score {
    font-size: .75rem;
    background: var(--primary-light);
    color: var(--primary);
    padding: .1rem .45rem;
    border-radius: 50px;
    font-weight: 600;
    margin-left: auto;
    flex-shrink: 0;
  }

  mark { background: #fef08a; color: #713f12; border-radius: 3px; padding: 0 2px; }
  [data-theme="dark"] mark { background: #854d0e; color: #fef08a; }

  /* ====== Progress pct ====== */
  .progress-label {
    font-size: .72rem;
    font-weight: 600;
    color: rgba(255,255,255,.85);
    text-align: right;
    padding: .1rem 1.25rem 0;
  }

  /* ====== Animations ====== */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
  }

  /* ====== Responsive ====== */
  @media (max-width: 640px) {
    .header-inner { padding: .75rem 1rem; }
    .logo { font-size: 1.1rem; }
    #main-container { padding: 1rem .75rem 2rem; }
    .nav-bar { flex-direction: column; align-items: stretch; }
    .search-wrap { min-width: 0; }
    .mini-lesson-header { flex-direction: column; }
  }

  /* ====== Accessibility ====== */
  .sr-only {
    position: absolute; width: 1px; height: 1px;
    padding: 0; margin: -1px; overflow: hidden;
    clip: rect(0,0,0,0); white-space: nowrap; border: 0;
  }
</style>
</head>
<body>

<!-- ======================== HEADER ======================== -->
<header>
  <div class="header-inner">
    <div class="logo">
      <i class="fas fa-robot" aria-hidden="true"></i>
      <span>CerneOracle</span>
    </div>
    <div class="header-controls">
      <button id="dark-mode-toggle" class="icon-btn" aria-label="Alternar modo escuro" aria-pressed="false">
        <i class="fas fa-moon" aria-hidden="true"></i>
      </button>
    </div>
  </div>
  <div class="progress-label" id="progress-label" aria-live="polite">0%</div>
  <div class="progress-wrap" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="Progresso de exploração">
    <div id="progress-bar"></div>
  </div>
</header>

<!-- ======================== MAIN ======================== -->
<div id="main-container">

  <!-- Nav bar -->
  <nav class="nav-bar" aria-label="Navegação e busca">
    <div id="breadcrumb" class="breadcrumb" aria-label="Breadcrumb">
      <span data-id="start">Início</span>
    </div>
    <div class="search-wrap" role="search">
      <i class="fas fa-search search-icon-left" aria-hidden="true"></i>
      <input type="search" id="search-input" placeholder="Buscar práticas… (BM25)" aria-label="Pesquisar práticas CERNE" autocomplete="off">
      <i class="fas fa-times search-clear" id="search-clear" aria-hidden="true" role="button" tabindex="0" aria-label="Limpar busca"></i>
    </div>
  </nav>

  <!-- Chat -->
  <div id="chat-container" aria-live="polite" aria-label="Conteúdo da prática"></div>

</div>

<!-- Buttons -->
<div id="buttons-container" role="navigation" aria-label="Opções de navegação" style="max-width:800px;width:100%;padding:0 1rem 2rem;"></div>

<!-- Achievement toast -->
<div id="achievement" class="achievement" role="status" aria-live="assertive">
  <div class="achievement-icon"><i class="fas fa-award" aria-hidden="true"></i></div>
  <div class="achievement-content">
    <h3>Nova Conquista!</h3>
    <p>Você desbloqueou: <strong id="achievement-name">Explorador Iniciante</strong></p>
  </div>
</div>

<script>
/* =============================================================
   CONVERSATION FLOW
   ============================================================= */
const conversation = {
  start: {
    text: `👋 Saudações!\n\n✨ Eu sou o <strong>CerneOracle</strong>, guardião da sabedoria do Modelo CERNE.\n🛡️ Fui criado para te guiar pelos pilares que fortalecem incubadoras de sucesso.\n\nEscolha abaixo o nível que deseja explorar e vamos crescer juntos! 🚀`,
    options: [
      { text: "🌱 Cerne 1 — Processos de Gestão", next: "cerne1", cls: "btn-c1" },
      { text: "🌿 Cerne 2 — Planejamento e Avaliação", next: "cerne2", cls: "btn-c2" },
      { text: "🌳 Cerne 3 — Rede e Sustentabilidade", next: "cerne3", cls: "btn-c3" },
      { text: "🏔️ Cerne 4 — Alcance Internacional", next: "cerne4", cls: "btn-c4" }
    ]
  },
  cerne1: {
    text: "🌱 <strong>Cerne 1 — Processos de Gestão e Organização</strong>\nEscolha um tópico:",
    options: [
      { text: "💡 1.1.1 Sensibilização",    next: "cerne1_1_1", cls: "btn-c1" },
      { text: "🔍 1.1.2 Prospecção",         next: "cerne1_1_2", cls: "btn-c1" },
      { text: "🎯 1.1.3 Qualificação",       next: "cerne1_1_3", cls: "btn-c1" },
      { text: "📥 1.2.1 Recepção de Propostas", next: "cerne1_2_1", cls: "btn-c1" },
      { text: "⚖️ 1.2.2 Avaliação",          next: "cerne1_2_2", cls: "btn-c1" },
      { text: "📝 1.2.3 Contratação",         next: "cerne1_2_3", cls: "btn-c1" },
      { text: "📅 1.3.1 Planejamento",        next: "cerne1_3_1", cls: "btn-c1" },
      { text: "➕ 1.3.2 Agregação de Valor", next: "cerne1_3_2", cls: "btn-c1" },
      { text: "🔄 1.3.3 Monitoramento",       next: "cerne1_3_3", cls: "btn-c1" },
      { text: "🎓 1.4.1 Graduação",           next: "cerne1_4_1", cls: "btn-c1" },
      { text: "🤝 1.4.2 Relacionamento com Graduadas", next: "cerne1_4_2", cls: "btn-c1" },
      { text: "🏢 1.5.1 Estrutura Organizacional", next: "cerne1_5_1", cls: "btn-c1" },
      { text: "⚙️ 1.5.2 Gestão do Mecanismo", next: "cerne1_5_2", cls: "btn-c1" },
      { text: "📣 1.5.3 Comunicação e Marketing", next: "cerne1_5_3", cls: "btn-c1" }
    ]

/* =============================================================
   BM25 ENGINE
   ============================================================= */
const BM25 = (() => {
  const K1 = 1.5, B = 0.75;
  const STOPWORDS_PT = new Set(["de","a","o","que","e","do","da","em","um","para","com","uma","os","no","se","na","por","mais","as","dos","como","mas","foi","ao","ele","das","tem","à","seu","sua","ou","ser","quando","muito","há","nos","já","também","só","pelo","pela","até","isso","ela","entre","era","depois","sem","mesmo","aos","ter","seus","quem","nas","me","esse","eles","estão","você","tinha","foram","essa","num","nem","suas","meu","às","minha","têm","numa","pelos","pelas","essa","este","del","te","lo"]);

  function tokenize(text) {
    return text.toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-z0-9\s]/g, " ")
      .split(/\s+/)
      .filter(t => t.length > 2 && !STOPWORDS_PT.has(t));
  }

  function buildIndex(docs) {
    // docs: [{id, text}]
    const tf = [], docLen = [];
    const df = {};
    const N = docs.length;

    docs.forEach((doc, i) => {
      const tokens = tokenize(doc.text);
      docLen.push(tokens.length);
      const freq = {};
      tokens.forEach(t => { freq[t] = (freq[t] || 0) + 1; });
      tf.push(freq);
      Object.keys(freq).forEach(t => { df[t] = (df[t] || 0) + 1; });
    });

    const avgdl = docLen.reduce((a,b) => a+b, 0) / N;

    function score(queryTokens, docIdx) {
      let s = 0;
      const freq = tf[docIdx];
      const dl = docLen[docIdx];
      queryTokens.forEach(t => {
        if (!freq[t]) return;
        const idf = Math.log((N - (df[t]||0) + 0.5) / ((df[t]||0) + 0.5) + 1);
        const tfVal = freq[t] * (K1 + 1) / (freq[t] + K1 * (1 - B + B * dl / avgdl));
        s += idf * tfVal;
      });
      return s;
    }

    function search(query, topK = 20) {
      const qTokens = tokenize(query);
      if (!qTokens.length) return [];
      return docs
        .map((doc, i) => ({ id: doc.id, score: score(qTokens, i) }))
        .filter(r => r.score > 0)
        .sort((a, b) => b.score - a.score)
        .slice(0, topK);
    }

    return { search, tokenize };
  }

  return { buildIndex };
})();

function setupListeners() {
  // Dark mode
  document.getElementById("dark-mode-toggle").addEventListener("click", toggleDarkMode);

  // Search
  const input = document.getElementById("search-input");
  const clear = document.getElementById("search-clear");
  let debounce;
  input.addEventListener("input", () => {
    clearTimeout(debounce);
    debounce = setTimeout(() => {
      if (input.value.trim().length >= 2) handleSearch(input.value.trim());
    }, 200);
  });
  input.addEventListener("keydown", e => { if (e.key === "Escape") { input.value = ""; navigateTo(currentNode); } });
  clear.addEventListener("click", () => { input.value = ""; navigateTo(currentNode); input.focus(); });
  clear.addEventListener("keydown", e => { if (e.key === "Enter") clear.click(); });
}

function applyTheme() {
  const dark = localStorage.getItem("cerneOracle_dark") === "1";
  document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
  const btn = document.getElementById("dark-mode-toggle");
  btn.innerHTML = dark ? '<i class="fas fa-sun" aria-hidden="true"></i>' : '<i class="fas fa-moon" aria-hidden="true"></i>';
  btn.setAttribute("aria-pressed", String(dark));
  btn.setAttribute("aria-label", dark ? "Alternar para modo claro" : "Alternar para modo escuro");
}

function toggleDarkMode() {
  const isDark = document.documentElement.getAttribute("data-theme") === "dark";
  localStorage.setItem("cerneOracle_dark", isDark ? "0" : "1");
  applyTheme();
}

/* =============================================================
   NAVIGATION
   ============================================================= */
function navigateTo(nodeId) {
  currentNode = nodeId;
  if (!visitedNodes.has(nodeId)) {
    visitedNodes.add(nodeId);
    userProgress.totalVisited++;
    checkAchievements();
  }
  updateBreadcrumb(nodeId);
  clearContainers();
  renderNode(nodeId);
  updateProgressBar();
  saveState();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function updateBreadcrumb(nodeId) {
  const idx = breadcrumbHistory.findIndex(i => i.id === nodeId);
  if (idx !== -1) {
    breadcrumbHistory = breadcrumbHistory.slice(0, idx + 1);
  } else {
    let label = nodeId === "start" ? "Início"
      : (nodeId.match(/^cerne\d$/) ? `Cerne ${nodeId.slice(-1)}` : null)
      || groundings[nodeId]?.pratica
      || nodeId.replace(/_/g, " ");
    breadcrumbHistory.push({ id: nodeId, text: label });
  }
  renderBreadcrumb();
}

function renderBreadcrumb() {
  const bc = document.getElementById("breadcrumb");
  bc.innerHTML = "";
  breadcrumbHistory.forEach((item, i) => {
    const span = document.createElement("span");
    span.textContent = item.text;
    span.dataset.id = item.id;
    span.tabIndex = 0;
    span.setAttribute("role", "button");
    span.addEventListener("click", () => navigateTo(item.id));
    span.addEventListener("keydown", e => { if (e.key === "Enter") navigateTo(item.id); });
    bc.appendChild(span);
    if (i < breadcrumbHistory.length - 1) {
      const sep = document.createElement("i");
      sep.className = "fas fa-chevron-right";
      sep.setAttribute("aria-hidden", "true");
      bc.appendChild(sep);
    }
  });
}

function clearContainers() {
  document.getElementById("chat-container").innerHTML = "";
  document.getElementById("buttons-container").innerHTML = "";
}

/* =============================================================
   RENDER
   ============================================================= */
function renderNode(nodeId) {
  const node = conversation[nodeId];
  renderRobot();
  if (!node) {
    const g = groundings[nodeId];
    if (g) {
      renderMessage(`Explorando: <strong>${g.pratica}</strong>`);
      renderMiniLesson(g);
      const q = quizzes[nodeId]; if (q) renderQuiz(q, nodeId);
    } else {
      renderMessage(`Conteúdo para '<em>${nodeId}</em>' não encontrado.`);
    }
    renderNavButtons();
    return;
  }
  renderMessage(node.text);
  const g = groundings[nodeId];
  if (g) {
    renderMiniLesson(g);
    const q = quizzes[nodeId]; if (q) renderQuiz(q, nodeId);
  }
  if (node.options?.length) renderOptions(node.options);
  renderNavButtons();
}

function renderRobot() {
  const el = document.createElement("div");
  el.className = "robot";
  el.textContent = "🤖";
  el.setAttribute("aria-hidden", "true");
  document.getElementById("chat-container").appendChild(el);
}

function renderMessage(html) {
  const el = document.createElement("div");
  el.className = "message";
  el.innerHTML = html;
  const actions = document.createElement("div");
  actions.className = "message-actions";

  const plainText = el.textContent || "";

  const audioBtn = makeActionBtn("fas fa-volume-up", "Ouvir", () => speakText(plainText));
  const shareBtn = makeActionBtn("fas fa-share-alt", "Compartilhar", () => shareContent(plainText));
  actions.append(audioBtn, shareBtn);
  el.appendChild(actions);
  document.getElementById("chat-container").appendChild(el);
}

function makeActionBtn(iconCls, label, onClick) {
  const btn = document.createElement("button");
  btn.className = "action-btn";
  btn.setAttribute("aria-label", label);
  btn.innerHTML = `<i class="${iconCls}" aria-hidden="true"></i> ${label}`;
  btn.addEventListener("click", onClick);
  return btn;
}

function renderMiniLesson(g) {
  const sec = document.createElement("div");
  sec.className = "mini-lesson";

  const hdr = document.createElement("div");
  hdr.className = "mini-lesson-header";

  const title = document.createElement("div");
  title.className = "mini-lesson-title";
  title.textContent = g.pratica;

  const badge = document.createElement("span");
  badge.className = `level-badge level-${g.nivel}`;
  badge.innerHTML = `<i class="fas fa-layer-group" aria-hidden="true"></i> Cerne ${g.nivel}`;

  hdr.append(title, badge);
  sec.appendChild(hdr);

  const fields = [
    ["descricao","Descrição"], ["objetivo","Objetivo"], ["acoes","Ações"],
    ["metricas","Métricas"], ["evidencias","Evidências"], ["exemplos","Exemplos"], ["dicas","Dicas"]
  ];

  fields.forEach(([key, label]) => {
    if (!g[key]) return;
    const p = document.createElement("p");
    const strong = document.createElement("strong");
    strong.textContent = label + ": ";
    p.appendChild(strong);

    if (typeof g[key] === "string" && g[key].trim().startsWith("•")) {
      const ul = document.createElement("ul");
      g[key].split("•").map(s => s.trim()).filter(Boolean).forEach(item => {
        const li = document.createElement("li"); li.textContent = item; ul.appendChild(li);
      });
      p.appendChild(ul);
    } else {
      p.appendChild(document.createTextNode(g[key]));
    }
    sec.appendChild(p);
  });

  const textForAudio = fields.map(([k,l]) => g[k] ? `${l}: ${g[k]}` : "").filter(Boolean).join(". ");
  const actions = document.createElement("div");
  actions.className = "message-actions";
  actions.append(
    makeActionBtn("fas fa-volume-up", "Ouvir", () => speakText(g.pratica + ". " + textForAudio)),
    makeActionBtn("fas fa-share-alt", "Compartilhar", () => shareContent(g.pratica + "\n" + textForAudio))
  );
  sec.appendChild(actions);
  document.getElementById("chat-container").appendChild(sec);
}

function renderQuiz(quiz, nodeId) {
  const container = document.createElement("div");
  container.className = "quiz-container";
  container.id = `quiz-${nodeId}`;

  const titleEl = document.createElement("div");
  titleEl.className = "quiz-title";
  titleEl.innerHTML = '<i class="fas fa-question-circle" aria-hidden="true"></i> Quiz: Teste seu conhecimento';

  const qEl = document.createElement("div");
  qEl.className = "quiz-question";
  qEl.textContent = quiz.question;

  const opts = document.createElement("div");
  opts.className = "quiz-options";
  quiz.options.forEach((opt, i) => {
    const div = document.createElement("div");
    div.className = "quiz-option";
    div.tabIndex = 0;
    div.dataset.index = i;
    div.setAttribute("role", "button");

    const marker = document.createElement("div");
    marker.className = "quiz-marker";
    marker.textContent = String.fromCharCode(65 + i);

    const txt = document.createElement("div");
    txt.textContent = opt;

    div.append(marker, txt);
    div.addEventListener("click", () => handleQuizAnswer(nodeId, i));
    div.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); handleQuizAnswer(nodeId, i); }});
    opts.appendChild(div);
  });

  const feedback = document.createElement("div");
  feedback.className = "quiz-feedback";
  feedback.id = `quiz-feedback-${nodeId}`;

  container.append(titleEl, qEl, opts, feedback);
  document.getElementById("chat-container").appendChild(container);
}

function renderOptions(options) {
  const bc = document.getElementById("buttons-container");
  options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = `btn ${opt.cls || "btn-primary"}`;
    btn.innerHTML = opt.text;
    btn.addEventListener("click", () => navigateTo(opt.next));
    bc.appendChild(btn);
  });
}

function renderNavButtons() {
  const bc = document.getElementById("buttons-container");
  bc.querySelectorAll(".btn-secondary, .btn-home").forEach(b => b.remove());

  if (breadcrumbHistory.length > 1) {
    const prev = breadcrumbHistory[breadcrumbHistory.length - 2].id;
    const back = document.createElement("button");
    back.className = "btn btn-secondary";
    back.innerHTML = '<i class="fas fa-arrow-left" aria-hidden="true"></i> Voltar';
    back.addEventListener("click", () => navigateTo(prev));
    bc.insertBefore(back, bc.firstChild);
  }

  if (currentNode !== "start") {
    const home = document.createElement("button");
    home.className = "btn btn-home";
    home.innerHTML = '<i class="fas fa-home" aria-hidden="true"></i> Início';
    home.addEventListener("click", () => navigateTo("start"));
    bc.insertBefore(home, bc.firstChild);
  }
}

/* =============================================================
   QUIZ HANDLING
   ============================================================= */
function handleQuizAnswer(nodeId, selected) {
  const quiz = quizzes[nodeId];
  if (!quiz) return;
  const container = document.getElementById(`quiz-${nodeId}`);
  if (container.dataset.answered === "true") return;
  container.dataset.answered = "true";

  const opts = container.querySelectorAll(".quiz-option");
  opts.forEach(o => { o.style.pointerEvents = "none"; o.setAttribute("aria-disabled", "true"); });
  opts[selected].classList.add(quiz.correctAnswer === selected ? "correct" : "incorrect");

  const isCorrect = selected === quiz.correctAnswer;
  userProgress.quizzesCompleted++;
  isCorrect ? (userProgress.quizzesCorrect++, userProgress.consecutiveCorrect++) : (userProgress.consecutiveCorrect = 0);
  checkAchievements();
  saveState();

  setTimeout(() => {
    opts.forEach((o, i) => {
      if (i === quiz.correctAnswer) o.classList.add("correct");
      else if (i === selected && !isCorrect) o.classList.add("incorrect");
    });
    const fb = document.getElementById(`quiz-feedback-${nodeId}`);
    fb.innerHTML = isCorrect
      ? `✅ <strong>Correto!</strong> ${quiz.explanation}`
      : `❌ <strong>Incorreto.</strong> ${quiz.explanation}`;
    fb.classList.add(isCorrect ? "correct" : "incorrect");
    playFeedbackSound(isCorrect);
    updateProgressBar();
  }, 400);
}

/* =============================================================
   BM25 SEARCH
   ============================================================= */
function handleSearch(query) {
  const results = bm25Index.search(query, 20);
  displaySearchResults(results, query);
}

function highlightTerms(text, tokens) {
  if (!tokens.length) return text;
  const re = new RegExp(`(${tokens.map(t => t.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")).join("|")})`, "gi");
  return text.replace(re, "<mark>$1</mark>");
}

function displaySearchResults(results, query) {
  clearContainers();
  renderRobot();

  const qTokens = bm25Index.tokenize ? [] : [];
  // Re-tokenize for highlighting
  const rawTokens = query.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9\s]/g," ").split(/\s+/).filter(t => t.length > 1);

  const msgEl = document.createElement("div");
  msgEl.className = "message";
  msgEl.innerHTML = results.length > 0
    ? `🔍 <strong>${results.length}</strong> resultado(s) encontrado(s) para "<em>${query}</em>" <span class="search-results-info">(Okapi BM25)</span>`
    : `🔍 Nenhum resultado para "<em>${query}</em>". Tente outros termos.`;
  document.getElementById("chat-container").appendChild(msgEl);

  const bc = document.getElementById("buttons-container");
  results.forEach(r => {
    const g = groundings[r.id];
    if (!g) return;
    const btn = document.createElement("button");
    btn.className = "btn btn-primary";
    btn.style.justifyContent = "space-between";
    btn.style.textAlign = "left";
    const levelCls = `level-${g.nivel}`;
    const highlighted = highlightTerms(g.pratica, rawTokens);
    btn.innerHTML = `<span><span class="level-badge ${levelCls}" style="margin-right:.4rem">Cerne ${g.nivel}</span>${highlighted}</span><span class="result-score">${r.score.toFixed(2)}</span>`;
    btn.addEventListener("click", () => navigateTo(r.id));
    bc.appendChild(btn);
  });

  const homeBtn = document.createElement("button");
  homeBtn.className = "btn btn-home";
  homeBtn.innerHTML = '<i class="fas fa-home" aria-hidden="true"></i> Início';
  homeBtn.addEventListener("click", () => { document.getElementById("search-input").value = ""; navigateTo("start"); });
  bc.appendChild(homeBtn);
}

/* =============================================================
   PROGRESS & ACHIEVEMENTS
   ============================================================= */
function updateProgressBar() {
  const total = Object.keys(groundings).length;
  const visited = [...visitedNodes].filter(n => groundings[n]).length;
  const pct = total > 0 ? Math.min(100, Math.round(visited / total * 100)) : 0;
  document.getElementById("progress-bar").style.width = `${pct}%`;
  document.getElementById("progress-label").textContent = `${pct}% explorado`;
  document.querySelector(".progress-wrap")?.setAttribute("aria-valuenow", pct);
}

function checkAchievements() {
  const v = visitedNodes;

  if (userProgress.totalVisited > 1)                           tryUnlock("explorador_iniciante");
  if ([...v].filter(n => n.startsWith("cerne1_")).length >= 5) tryUnlock("conhecedor_cerne1");
  if ([...v].filter(n => n.startsWith("cerne2_")).length >= 3) tryUnlock("conhecedor_cerne2");
  if ([...v].filter(n => n.startsWith("cerne3_")).length >= 3) tryUnlock("conhecedor_cerne3");
  if ([...v].filter(n => n.startsWith("cerne4_")).length >= 1) tryUnlock("conhecedor_cerne4");

  if (userProgress.earnedAchievements.has("conhecedor_cerne1") &&
      userProgress.earnedAchievements.has("conhecedor_cerne2"))   tryUnlock("boss_cerne2");
  if (userProgress.earnedAchievements.has("boss_cerne2") &&
      userProgress.earnedAchievements.has("conhecedor_cerne3"))   tryUnlock("boss_cerne3");
  if (userProgress.earnedAchievements.has("boss_cerne3") &&
      userProgress.earnedAchievements.has("conhecedor_cerne4"))   tryUnlock("boss_cerne4");

  if (userProgress.consecutiveCorrect >= 3)                       tryUnlock("mestre_quiz");

  const levels = new Set([...v].filter(n => groundings[n]).map(n => n.match(/^cerne(\d)/)?.[1]).filter(Boolean));
  if (levels.size >= 4)                                           tryUnlock("explorador_completo");
}

function tryUnlock(id) {
  if (userProgress.earnedAchievements.has(id)) return;
  const a = achievements[id]; if (!a) return;
  userProgress.earnedAchievements.add(id);
  saveState();

  const el = document.getElementById("achievement");
  document.getElementById("achievement-name").textContent = a.name;
  el.querySelector(".achievement-icon i").className = a.icon;
  el.querySelector(".achievement-content p").innerHTML = `Você desbloqueou: <strong>${a.name}</strong><br><small>${a.desc}</small>`;
  el.classList.add("show");
  playAchievementSound();
  setTimeout(() => el.classList.remove("show"), 5000);
}

/* =============================================================
   AUDIO
   ============================================================= */
function speakText(text) {
  if (!("speechSynthesis" in window)) { alert("Seu navegador não suporta leitura de texto."); return; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "pt-BR";
  speechSynthesis.speak(u);
}

function shareContent(text) {
  if (navigator.share) {
    navigator.share({ title:"CerneOracle", text }).catch(() => {});
  } else {
    navigator.clipboard?.writeText(text).then(() => alert("Copiado para a área de transferência!"))
      .catch(() => alert("Não foi possível copiar."));
  }
}

function playFeedbackSound(correct) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = "sine";
    gain.gain.setValueAtTime(0.08, ctx.currentTime);
    osc.frequency.setValueAtTime(correct ? 880 : 440, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.35);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.35);
  } catch(e) {}
}

function playAchievementSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = "triangle";
    gain.gain.setValueAtTime(0.08, ctx.currentTime);
    osc.frequency.setValueAtTime(523.25, ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(659.25, ctx.currentTime + 0.1);
    osc.frequency.linearRampToValueAtTime(783.99, ctx.currentTime + 0.2);
    osc.frequency.linearRampToValueAtTime(1046.50, ctx.currentTime + 0.3);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.5);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.5);
  } catch(e) {}
}
