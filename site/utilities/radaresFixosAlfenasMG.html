<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radares Fixos · Alfenas-MG</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --color-bg: #f5f7fa;
            --color-surface: #ffffff;
            --color-border: #e2e8f0;
            --color-text: #1a202c;
            --color-text-secondary: #64748b;
            --color-accent: #2563eb;
            --color-danger: #dc2626;
            --color-warning: #f59e0b;
            --color-success: #16a34a;
            --color-info: #6366f1;
            --radius: 10px;
            --radius-sm: 6px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.1);
            --transition: 0.2s ease;
            --font: 'Inter', system-ui, -apple-system, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font);
            background: var(--color-bg);
            color: var(--color-text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }
        button, input, select { font-family: inherit; font-size: inherit; }

        /* HEADER */
        .header {
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            padding: 0.75rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            z-index: 1000;
            box-shadow: var(--shadow-sm);
            flex-shrink: 0;
        }
        .header__title {
            font-weight: 650;
            font-size: 1rem;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--color-text);
        }
        .header__title svg { width:20px; height:20px; color: var(--color-accent); flex-shrink:0; }
        .header__actions { display:flex; gap:0.5rem; align-items:center; }
        .iconBtn {
            background: none;
            border: none;
            cursor: pointer;
            position: relative;
            padding: 0.45rem;
            border-radius: 50%;
            color: var(--color-text-secondary);
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .iconBtn:hover { background: #f1f5f9; color: var(--color-text); }
        .iconBtn svg { width:22px; height:22px; }
        .badge {
            position: absolute;
            top: 2px;
            right: 2px;
            background: var(--color-danger);
            color: #fff;
            font-size: 0.65rem;
            font-weight: 700;
            min-width: 18px;
            height: 18px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            padding: 0 4px;
            pointer-events: none;
        }
        .badge:empty { display: none; }

        /* MAIN MAP CONTAINER */
        .mapContainer {
            flex: 1;
            width: 100%;
            position: relative;
            background: #e9ecef;
            z-index: 1;
        }
        .mapContainer .leaflet-popup-content-wrapper {
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-md);
            font-family: var(--font);
            padding: 4px;
        }
        .mapContainer .leaflet-popup-content {
            margin: 10px 12px;
            font-size: 0.82rem;
            line-height: 1.5;
        }
        .popup-actions {
            margin-top: 0.5rem;
            display: flex;
            gap: 0.5rem;
        }
        .btnSm {
            background: var(--color-accent);
            color: #fff;
            border: none;
            padding: 0.35rem 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.7rem;
            transition: var(--transition);
        }
        .btnSm:hover { background: #1d4ed8; }

        /* DRAWER (notifications) */
        .drawerOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.25);
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition);
        }
        .drawerOverlay.open { opacity:1; pointer-events:auto; }
        .drawer {
            position: fixed;
            right: 0;
            top: 0;
            height: 100%;
            width: 360px;
            max-width: 90vw;
            background: var(--color-surface);
            box-shadow: var(--shadow-md);
            z-index: 2100;
            transform: translateX(105%);
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--color-border);
        }
        .drawer.open { transform: translateX(0); }
        .drawer__header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 650;
            font-size: 0.9rem;
        }
        .drawer__close {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.3rem;
            border-radius: 50%;
            color: var(--color-text-secondary);
            transition: var(--transition);
        }
        .drawer__close:hover { background: #f1f5f9; }
        .drawer__list {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem;
            list-style: none;
        }
        .notifItem {
            padding: 0.8rem;
            border-radius: var(--radius-sm);
            margin-bottom: 0.4rem;
            background: #f8fafc;
            border-left: 4px solid transparent;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.78rem;
            display: flex;
            gap: 0.5rem;
            align-items: flex-start;
        }
        .notifItem--unread { background: #eff6ff; border-left-color: var(--color-accent); font-weight: 500; }
        .notifItem:hover { background: #f1f5f9; }
        .notifItem__icon { font-size: 1rem; flex-shrink:0; margin-top:2px; }
        .notifItem__text { flex:1; }
        .notifItem__time { font-size: 0.65rem; color: var(--color-text-secondary); }

        /* MODAL (radar details / list) */
        .modalOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.35);
            z-index: 2500;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition);
        }
        .modalOverlay.open { opacity:1; pointer-events:auto; }
        .modal {
            background: var(--color-surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            width: 95%;
            max-width: 560px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 1.5rem;
            position: relative;
            transform: translateY(15px);
            transition: transform 0.2s ease;
        }
        .modalOverlay.open .modal { transform: translateY(0); }
        .modal__close {
            position: absolute;
            top: 0.8rem;
            right: 1rem;
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: var(--color-text-secondary);
            padding: 0.3rem;
        }
        .modal__title { font-weight: 650; font-size: 1rem; margin-bottom: 1rem; }
        .fieldRow { display:flex; justify-content:space-between; padding:0.35rem 0; border-bottom:1px solid #f3f4f6; font-size:0.8rem; }
        .fieldRow__label { color: var(--color-text-secondary); }
        .insightChip {
            display: inline-block;
            background: #f1f5f9;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            margin: 0.2rem;
        }
        .insightChip--warn { background: #fee2e2; color:#991b1b; }
        .insightChip--ok { background: #dcfce7; color:#166534; }

        /* FAB (floating action button for list) */
        .fab {
            position: fixed;
            bottom: 1.5rem;
            left: 1.5rem;
            z-index: 1500;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 50px;
            padding: 0.6rem 1.2rem;
            box-shadow: var(--shadow-md);
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.8rem;
            transition: var(--transition);
            color: var(--color-text);
        }
        .fab:hover { background: #f8fafc; }

        /* TOAST */
        .toastContainer {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .toast {
            background: var(--color-danger);
            color: #fff;
            padding: 0.75rem 1rem;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-md);
            font-size: 0.8rem;
            font-weight: 500;
            animation: slideUp 0.3s ease;
            max-width: 320px;
        }
        @keyframes slideUp { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
        .toast__close { margin-left:0.5rem; background:none; border:none; color:#fff; cursor:pointer; font-weight:700; }

        /* MUTE BUTTON */
        .muteBtn {
            margin-left: 0.5rem;
        }

        @media (max-width: 640px) {
            .drawer { width: 100%; max-width: 100%; }
            .fab { bottom: 1rem; left: 1rem; padding: 0.5rem 1rem; font-size:0.75rem; }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <div class="header__title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
            Radares Fixos · Alfenas-MG
        </div>
        <div class="header__actions">
            <button class="iconBtn muteBtn" id="muteBtn" title="Silenciar alertas sonoros">
                <svg id="muteIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                    <path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/>
                </svg>
            </button>
            <button class="iconBtn" id="notificationBell" aria-label="Notificações">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
                <span class="badge" id="notificationBadge">0</span>
            </button>
        </div>
    </header>

    <!-- MAP -->
    <div class="mapContainer" id="leafletMap" aria-label="Mapa de radares"></div>

    <!-- FAB para lista de radares -->
    <button class="fab" id="fabList">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
        Lista de radares
    </button>

    <!-- DRAWER notifications -->
    <div class="drawerOverlay" id="drawerOverlay"></div>
    <aside class="drawer" id="notificationDrawer">
        <div class="drawer__header">
            Notificações
            <button class="drawer__close" id="drawerCloseBtn" aria-label="Fechar notificações">&times;</button>
        </div>
        <ul class="drawer__list" id="notificationList"></ul>
    </aside>

    <!-- MODAL detalhes radar -->
    <div class="modalOverlay" id="detailModalOverlay">
        <div class="modal" id="detailModal">
            <button class="modal__close" id="detailModalClose">&times;</button>
            <div class="modal__title">Detalhes do Radar</div>
            <div id="detailModalContent"></div>
        </div>
    </div>

    <!-- MODAL lista de radares (com filtros) -->
    <div class="modalOverlay" id="listModalOverlay">
        <div class="modal" style="max-width:700px;" id="listModal">
            <button class="modal__close" id="listModalClose">&times;</button>
            <div class="modal__title">Equipamentos Cadastrados</div>
            <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.75rem;">
                <input type="text" id="listSearch" placeholder="Filtrar..." style="flex:1;min-width:140px;padding:0.4rem;border:1px solid var(--color-border);border-radius:4px;">
                <select id="listTypeFilter" style="padding:0.4rem;border:1px solid var(--color-border);border-radius:4px;">
                    <option value="all">Todos</option><option value="speed">Velocidade</option><option value="redLight">Semáforo</option><option value="restriction">Restrição</option>
                </select>
            </div>
            <div style="max-height:50vh;overflow-y:auto;" id="listTableContainer"></div>
        </div>
    </div>

    <!-- TOAST container -->
    <div class="toastContainer" id="toastContainer"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        /**
         * @fileOverview Monitor de radares fixos Alfenas-MG com alerta sonoro de proximidade.
         * UX/UI aprimorada: mapa central, notificações (sino), popups/modal, lista encapsulada.
         * Arquitetura MVC, IA simbólica, geolocalização. Código em inglês, views pt-br.
         */

        // =============================================================================
        //                          SYMBOLIC AI KNOWLEDGE BASE
        // =============================================================================
        const symbolicKB = Object.freeze({
            rules: Object.freeze([
                { id: 'R1', cond: r => r.type.includes('avanço'), conclusion: 'Alto risco: cruzamento semafórico.', priority: 1 },
                { id: 'R2', cond: r => r.speed === 40 && !r.type.includes('avanço'), conclusion: 'Risco moderado: via 40 km/h.', priority: 2 },
                { id: 'R3', cond: r => r.speed == null, conclusion: 'Restrição de circulação.', priority: 3 },
                { id: 'R4', cond: r => r.location.includes('Lincoln'), conclusion: 'Corredor de grande fluxo.', priority: 4 },
                { id: 'R5', cond: r => r.location.includes('Governador'), conclusion: 'Avenida central densa.', priority: 5 },
            ]),
            city: { name: 'Alfenas', state: 'MG', center: { lat: -21.4291, lng: -45.9471 } },
        });

        // =============================================================================
        //                          UTILS
        // =============================================================================
        const haversine = (lat1, lng1, lat2, lng2) => {
            const R = 6371000, toRad = d => d * Math.PI / 180;
            const dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
            const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        };

        // =============================================================================
        //                          AUDIO SERVICE (BEEP)
        // =============================================================================
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let audioEnabled = false; // será ativado após primeiro clique do usuário
        let isMuted = false;

        /**
         * @brief Reproduz um bipe curto de alerta.
         * @param {number} frequency - Frequência em Hz (padrão 800).
         * @param {number} duration - Duração em segundos (padrão 0.15).
         */
        function playBeep(frequency = 800, duration = 0.15) {
            if (isMuted || !audioEnabled) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = frequency;
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (e) {
                console.warn('Falha ao reproduzir som:', e);
            }
        }

        // Ativa o contexto de áudio na primeira interação do usuário
        document.addEventListener('click', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            audioEnabled = true;
        }, { once: true });

        // =============================================================================
        //                          MODEL LAYER
        // =============================================================================
        class RadarModel {
            constructor(raw, coords) {
                this.code = raw.code; this.location = raw.location; this.speed = raw.speed;
                this.type = raw.type; this.startDate = raw.startDate;
                this.direction = (raw.location.match(/Sentido\s+(B\/C|C\/B)/i)||[])[1]||null;
                this.isRedLight = this.type.includes('avanço');
                this.isRestriction = this.code.startsWith('RTL');
                this.category = this.isRedLight ? 'redLight' : (this.isRestriction ? 'restriction' : 'speed');
                this.lat = coords?.lat ?? null; this.lng = coords?.lng ?? null;
                this.distanceToUser = null;
            }
            getSpeedLabel() { return this.speed != null ? `${this.speed} km/h` : 'N/A'; }
            isIntersection() { return this.location.includes(' X '); }
            getIcon() {
                const c = { redLight:'#dc2626', restriction:'#7c3aed', speed:'#f59e0b' }[this.category]||'#94a3b8';
                return L.divIcon({ className:'', html:`<div style="width:22px;height:22px;background:${c};border:2px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.3);"></div>`, iconSize:[22,22], iconAnchor:[11,11], popupAnchor:[0,-14] });
            }
        }

        class NotificationModel {
            constructor(id, message, radarCode, type='info') {
                this.id = id; this.message = message; this.radarCode = radarCode;
                this.type = type; this.read = false; this.timestamp = Date.now();
            }
        }

        class RadarStore {
            constructor() { if(RadarStore._inst) return RadarStore._inst; this._radars=[]; this._obs=new Set(); RadarStore._inst=this; }
            static get() { return RadarStore._inst||new RadarStore(); }
            load(raw, coords) { this._radars = raw.map(d=>new RadarModel(d,coords[d.code]||null)); this._notify(); }
            getAll() { return [...this._radars]; }
            getByCode(code) { return this._radars.find(r=>r.code===code)||null; }
            subscribe(cb) { this._obs.add(cb); }
            _notify() { const all=this.getAll(); this._obs.forEach(cb=>cb(all)); }
        }

        class NotificationStore {
            constructor() { if(NotificationStore._inst) return NotificationStore._inst; this._notifs=[]; this._obs=new Set(); NotificationStore._inst=this; }
            static get() { return NotificationStore._inst||new NotificationStore(); }
            add(notif) { this._notifs.unshift(notif); this._notify(); }
            getAll() { return [...this._notifs]; }
            unreadCount() { return this._notifs.filter(n=>!n.read).length; }
            markAllRead() { this._notifs.forEach(n=>n.read=true); this._notify(); }
            markRead(id) { const n=this._notifs.find(x=>x.id===id); if(n) n.read=true; this._notify(); }
            subscribe(cb) { this._obs.add(cb); }
            _notify() { this._obs.forEach(cb=>cb(this.getAll())); }
        }

        class LocationService {
            constructor() { this.lat=null; this.lng=null; this.acc=null; this.enabled=false; this.watchId=null; this.listeners=new Set(); }
            subscribe(cb) { this.listeners.add(cb); }
            start() {
                if(!navigator.geolocation){ this._emit(); return; }
                this.watchId = navigator.geolocation.watchPosition(p=>{ this.lat=p.coords.latitude; this.lng=p.coords.longitude; this.acc=p.coords.accuracy; this.enabled=true; this._emit(); }, ()=>{ this.enabled=false; this._emit(); }, {enableHighAccuracy:true,maximumAge:20000,timeout:15000});
            }
            _emit() { this.listeners.forEach(cb=>cb(this.lat,this.lng,this.acc,this.enabled)); }
            updateDistances(radars) {
                if(!this.enabled||this.lat==null) return;
                radars.forEach(r=>{ if(r.lat) r.distanceToUser = haversine(this.lat, this.lng, r.lat, r.lng); else r.distanceToUser=null; });
            }
            getNearby(radars, radius=250) {
                if(!this.enabled) return [];
                return radars.filter(r=>r.distanceToUser!=null && r.distanceToUser<=radius).sort((a,b)=>a.distanceToUser-b.distanceToUser);
            }
        }

        // =============================================================================
        //                          VIEW LAYER
        // =============================================================================
        class MapView {
            constructor(containerId) {
                this.id = containerId; this.map=null; this.markers=L.layerGroup(); this.userMarker=null;
                this.onMarkerClick = null;
            }
            init() {
                const el=document.getElementById(this.id); if(!el||this.map) return;
                this.map = L.map(this.id).setView([symbolicKB.city.center.lat, symbolicKB.city.center.lng], 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution:'&copy; OSM', maxZoom:19}).addTo(this.map);
                this.markers.addTo(this.map);
            }
            setOnMarkerClick(cb) { this.onMarkerClick = cb; }
            render(radars) {
                if(!this.map) { this.init(); if(!this.map) return; }
                this.markers.clearLayers();
                radars.filter(r=>r.lat).forEach(r=>{
                    const m = L.marker([r.lat, r.lng], {icon: r.getIcon()}).addTo(this.markers);
                    const popupHtml = `<strong>${r.code}</strong><br>${r.location}<br>${r.getSpeedLabel()} · ${r.type}<div class="popup-actions"><button class="btnSm" data-code="${r.code}">Ver detalhes</button></div>`;
                    m.bindPopup(popupHtml);
                    m.on('popupopen', ()=>{
                        const btn = document.querySelector(`.btnSm[data-code="${r.code}"]`);
                        if(btn) btn.onclick = (e) => { e.stopPropagation(); if(this.onMarkerClick) this.onMarkerClick(r.code); m.closePopup(); };
                    });
                    m.on('click', ()=>{ if(this.onMarkerClick) this.onMarkerClick(r.code); });
                });
            }
            updateUserLocation(lat,lng,acc,enabled) {
                if(!this.map) return;
                if(this.userMarker) this.map.removeLayer(this.userMarker);
                if(!enabled||lat==null) return;
                this.userMarker = L.circleMarker([lat,lng], {radius:7, fillColor:'#2563eb', color:'#fff', weight:2, fillOpacity:1}).addTo(this.map).bindPopup('Você está aqui');
                if(acc) L.circle([lat,lng], {radius:acc, color:'#2563eb', opacity:0.2, fillOpacity:0.08, weight:1}).addTo(this.map);
            }
        }

        class NotificationDrawerView {
            constructor(drawerId, overlayId, bellId, badgeId) {
                this.drawer = document.getElementById(drawerId);
                this.overlay = document.getElementById(overlayId);
                this.bell = document.getElementById(bellId);
                this.badge = document.getElementById(badgeId);
                this.list = document.getElementById('notificationList');
                this._onItemClick = null;
                this._initEvents();
            }
            _initEvents() {
                this.bell?.addEventListener('click', ()=> this.open());
                this.overlay?.addEventListener('click', ()=> this.close());
                document.getElementById('drawerCloseBtn')?.addEventListener('click', ()=> this.close());
            }
            open() { this.drawer?.classList.add('open'); this.overlay?.classList.add('open'); }
            close() { this.drawer?.classList.remove('open'); this.overlay?.classList.remove('open'); }
            setOnItemClick(cb) { this._onItemClick = cb; }
            render(notifs) {
                if(!this.list) return;
                const unread = notifs.filter(n=>!n.read).length;
                if(this.badge) { this.badge.textContent = unread>0 ? unread : '0'; this.badge.style.display = unread>0 ? 'flex' : 'none'; }
                if(notifs.length===0) { this.list.innerHTML = '<li style="padding:1.5rem;text-align:center;color:var(--color-text-secondary);">Nenhuma notificação.</li>'; return; }
                this.list.innerHTML = notifs.map(n=>`
                <li class="notifItem ${n.read?'':'notifItem--unread'}" data-id="${n.id}" data-code="${n.radarCode||''}">
                    <span class="notifItem__icon">${n.type==='danger'?'⚠️':'📡'}</span>
                    <span class="notifItem__text">${n.message}</span>
                    <span class="notifItem__time">${new Date(n.timestamp).toLocaleTimeString()}</span>
                </li>`).join('');
                this.list.querySelectorAll('.notifItem').forEach(li=>{
                    li.addEventListener('click', ()=>{
                        const code = li.dataset.code;
                        const id = li.dataset.id;
                        if(this._onItemClick) this._onItemClick(code, id);
                        NotificationStore.get().markRead(id);
                    });
                });
            }
        }

        class ModalView {
            constructor(overlayId, modalId) {
                this.overlay = document.getElementById(overlayId);
                this.modal = document.getElementById(modalId);
                this.closeBtn = this.modal?.querySelector('.modal__close');
                this._initEvents();
            }
            _initEvents() {
                this.closeBtn?.addEventListener('click', ()=> this.close());
                this.overlay?.addEventListener('click', (e)=>{ if(e.target===this.overlay) this.close(); });
            }
            open() { this.overlay?.classList.add('open'); }
            close() { this.overlay?.classList.remove('open'); }
            setContent(html) { const content = this.modal?.querySelector('[id$="Content"]') || this.modal; if(content) content.innerHTML = html; }
        }

        class ToastView {
            constructor(containerId) { this.container = document.getElementById(containerId); }
            show(message, duration=4000) {
                const toast = document.createElement('div'); toast.className='toast';
                toast.innerHTML = `${message} <button class="toast__close">&times;</button>`;
                this.container.appendChild(toast);
                const close = ()=> { toast.remove(); clearTimeout(timer); };
                toast.querySelector('.toast__close').addEventListener('click', close);
                const timer = setTimeout(close, duration);
            }
        }

        // =============================================================================
        //                          CONTROLLER
        // =============================================================================
        class AppController {
            constructor() {
                this.store = RadarStore.get();
                this.notifStore = NotificationStore.get();
                this.location = new LocationService();
                this.mapView = new MapView('leafletMap');
                this.notifView = new NotificationDrawerView('notificationDrawer','drawerOverlay','notificationBell','notificationBadge');
                this.detailModal = new ModalView('detailModalOverlay','detailModal');
                this.listModal = new ModalView('listModalOverlay','listModal');
                this.toast = new ToastView('toastContainer');
                this.lastNearbyCodes = new Set();
                this._bind();
            }
            _bind() {
                this.store.subscribe(all => this._onRadarsChange(all));
                this.notifStore.subscribe(notifs => this.notifView.render(notifs));
                this.location.subscribe((lat,lng,acc,en) => this._onLocation(lat,lng,acc,en));
                this.mapView.setOnMarkerClick(code => this._showRadarDetail(code));
                this.notifView.setOnItemClick((code,id) => { if(code) this._showRadarDetail(code); });
                document.getElementById('fabList')?.addEventListener('click', ()=> this._openListModal());
                document.getElementById('listSearch')?.addEventListener('input', ()=> this._renderListModal());
                document.getElementById('listTypeFilter')?.addEventListener('change', ()=> this._renderListModal());
                document.getElementById('muteBtn')?.addEventListener('click', () => {
                    isMuted = !isMuted;
                    const icon = document.getElementById('muteIcon');
                    if (isMuted) {
                        icon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>';
                        this.toast.show('Alertas sonoros silenciados.');
                    } else {
                        icon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/>';
                        this.toast.show('Alertas sonoros ativados.');
                    }
                });
            }
            init() {
                const raw = [
                    {code:'ST00000447',location:'Av. Governador Valadares primeiro ao 2153 Sentido B/C',speed:40,type:'Medidor de velocidade',startDate:'15/05/2026'},
                    {code:'ST00000448',location:'Av. Governador Valadares primeiro ao 1895 Sentido C/B',speed:40,type:'Medidor de velocidade',startDate:'15/05/2026'},
                    {code:'ST00000449',location:'Av. Governador Valadares X Av. Machado de Assis Sentido C/B',speed:40,type:'Medidor de velocidade com avanço de sinal vermelho',startDate:'15/05/2026'},
                    {code:'ST00000451',location:'Av. Governador Valadares X Av. Machado de Assis Sentido B/C',speed:40,type:'Medidor de velocidade com avanço de sinal vermelho',startDate:'15/05/2026'},
                    {code:'ST00000452',location:'Praça Dr. Emílio Silveira primeiro ao 88 Sentido C/B',speed:40,type:'Medidor de velocidade com avanço de sinal vermelho',startDate:'15/05/2026'},
                    {code:'ST00000453',location:'Rua Coronel Pedro Corrêa X Rua Juscelino Barbosa Sentido C/B',speed:40,type:'Medidor de velocidade com avanço de sinal vermelho',startDate:'15/05/2026'},
                    {code:'ST00000454',location:'Av. Lincoln Westem da Silveira X Rua Alfredo D. Vieira e Silva Sentido C/B',speed:40,type:'Medidor de velocidade com avanço de sinal vermelho',startDate:'15/05/2026'},
                    {code:'ST00000460',location:'Av. Lincoln Westem da Silveira X Rua Alfredo D. Vieira e Silva Sentido B/C',speed:40,type:'Medidor de velocidade com avanço de sinal vermelho',startDate:'15/05/2026'},
                    {code:'RTL0000114',location:'Av. Lincoln Westem da Silveira 250m do 237 Sentido B/C',speed:null,type:'Restrição de circulação',startDate:'15/05/2026'},
                ];
                const coords = {
                    'ST00000447':{lat:-21.4275,lng:-45.9465},'ST00000448':{lat:-21.4282,lng:-45.9468},'ST00000449':{lat:-21.4286,lng:-45.9458},
                    'ST00000451':{lat:-21.4291,lng:-45.9460},'ST00000452':{lat:-21.4298,lng:-45.9478},'ST00000453':{lat:-21.4302,lng:-45.9463},
                    'ST00000454':{lat:-21.4310,lng:-45.9455},'ST00000460':{lat:-21.4312,lng:-45.9450},'RTL0000114':{lat:-21.4315,lng:-45.9445},
                };
                this.store.load(raw, coords);
                this.mapView.init();
                this.location.start();
                this.notifStore.add(new NotificationModel('welcome','Bem-vindo ao monitor de radares de Alfenas-MG. Ative sua localização.',null,'info'));
            }
            _onRadarsChange(all) { this.mapView.render(all); }
            _onLocation(lat,lng,acc,enabled) {
                const all = this.store.getAll();
                this.location.updateDistances(all);
                this.mapView.updateUserLocation(lat,lng,acc,enabled);
                const nearby = this.location.getNearby(all, 250);
                const currentCodes = new Set(nearby.map(r=>r.code));
                // notifica e emite som para novos radares próximos
                nearby.forEach(r=>{
                    if(!this.lastNearbyCodes.has(r.code)) {
                        this.notifStore.add(new NotificationModel(Date.now().toString(),`Você está a ${Math.round(r.distanceToUser)}m do radar ${r.code}. Reduza a velocidade.`, r.code, 'danger'));
                        this.toast.show(`⚠️ Radar próximo: ${r.code} a ${Math.round(r.distanceToUser)}m`);
                        // 🔊 Alerta sonoro
                        playBeep(880, 0.2);
                    }
                });
                this.lastNearbyCodes = currentCodes;
            }
            _showRadarDetail(code) {
                const radar = this.store.getByCode(code);
                if(!radar) return;
                const rules = symbolicKB.rules.filter(r=>r.cond(radar)).sort((a,b)=>a.priority-b.priority);
                const insightsHtml = rules.map(r=>`<span class="insightChip ${r.id==='R1'?'insightChip--warn':'insightChip--ok'}">${r.conclusion}</span>`).join('');
                const distStr = radar.distanceToUser!=null ? `<div class="fieldRow"><span class="fieldRow__label">Distância</span><span>${Math.round(radar.distanceToUser)} m</span></div>` : '';
                const html = `
                    <div class="fieldRow"><span class="fieldRow__label">Código</span><span>${radar.code}</span></div>
                    <div class="fieldRow"><span class="fieldRow__label">Local</span><span>${radar.location}</span></div>
                    <div class="fieldRow"><span class="fieldRow__label">Velocidade</span><span>${radar.getSpeedLabel()}</span></div>
                    <div class="fieldRow"><span class="fieldRow__label">Tipo</span><span>${radar.type}</span></div>
                    <div class="fieldRow"><span class="fieldRow__label">Sentido</span><span>${radar.direction||'N/A'}</span></div>
                    <div class="fieldRow"><span class="fieldRow__label">Cruzamento</span><span>${radar.isIntersection()?'Sim':'Não'}</span></div>
                    ${distStr}
                    <div style="margin-top:0.8rem;font-weight:600;">Análise inteligente:</div>
                    <div style="display:flex;flex-wrap:wrap;gap:0.3rem;margin-top:0.3rem;">${insightsHtml||'Nenhum insight adicional.'}</div>
                `;
                this.detailModal.setContent(html);
                this.detailModal.open();
            }
            _openListModal() {
                this._renderListModal();
                this.listModal.open();
            }
            _renderListModal() {
                const search = (document.getElementById('listSearch')?.value||'').toLowerCase();
                const type = document.getElementById('listTypeFilter')?.value||'all';
                let list = this.store.getAll();
                if(search) list = list.filter(r=>`${r.code} ${r.location} ${r.type}`.toLowerCase().includes(search));
                if(type!=='all') list = list.filter(r=>r.category===type);
                const container = document.getElementById('listTableContainer');
                if(!container) return;
                if(list.length===0) { container.innerHTML = '<div style="padding:1.5rem;text-align:center;color:var(--color-text-secondary);">Nenhum radar encontrado.</div>'; return; }
                container.innerHTML = `<table style="width:100%;border-collapse:collapse;font-size:0.75rem;">
                    <thead><tr style="background:#f8fafc;border-bottom:2px solid var(--color-border);">
                        <th style="padding:0.5rem;text-align:left;">Código</th><th>Local</th><th>Vel.</th><th>Tipo</th></tr></thead>
                    <tbody>${list.map(r=>`
                        <tr style="cursor:pointer;border-bottom:1px solid #f1f5f9;" data-code="${r.code}" class="listRow">
                            <td style="padding:0.4rem;">${r.code}</td><td>${r.location}</td><td>${r.getSpeedLabel()}</td><td>${r.type}</td>
                        </tr>`).join('')}</tbody></table>`;
                container.querySelectorAll('.listRow').forEach(row=>{
                    row.addEventListener('click', ()=>{
                        const code = row.dataset.code;
                        this.listModal.close();
                        this._showRadarDetail(code);
                    });
                });
            }
        }

        // =============================================================================
        //                          BOOTSTRAP
        // =============================================================================
        document.addEventListener('DOMContentLoaded', () => { new AppController().init(); });
    </script>
