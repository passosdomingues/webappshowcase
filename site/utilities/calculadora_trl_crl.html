<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Avalie o nível de maturidade tecnológica e comercial de sua tecnologia com base nos critérios NASA / DOE / ARPA-E e N…"/>
<title>Calculadora TRL/CRL</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e10;
    --surface: #18181c;
    --surface2: #22222a;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0efe8;
    --muted: #888880;
    --accent: #c8f055;
    --accent2: #8bfacc;
    --trl-color: #c8f055;
    --crl-color: #8bfacc;
    --red: #ff6b6b;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }
  .noise {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
    opacity: 0.4;
  }
  .container { max-width: 860px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

  /* HEADER */
  header {
    padding: 56px 0 40px;
    border-bottom: 0.5px solid var(--border);
    margin-bottom: 48px;
  }
  .header-tag {
    font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
  }
  .header-tag::before {
    content: ''; width: 24px; height: 1px; background: var(--accent); display: block;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(32px, 5vw, 52px);
    line-height: 1.1;
    font-weight: 400;
    letter-spacing: -0.02em;
  }
  header h1 em { font-style: italic; color: var(--accent); }
  header p {
    margin-top: 16px; color: var(--muted); max-width: 520px;
    font-size: 14px; line-height: 1.7;
  }

  /* PROFILE */
  .profile-section {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    margin-bottom: 48px;
  }
  .field-group label {
    display: block; font-size: 11px; font-weight: 500; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
  }
  .field-group input {
    width: 100%; background: var(--surface); border: 0.5px solid var(--border2);
    border-radius: 8px; padding: 12px 16px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    transition: border-color 0.2s;
    outline: none;
  }
  .field-group input:focus { border-color: var(--accent); }
  .field-group input::placeholder { color: var(--muted); }

  /* SECTIONS */
  .section-header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 24px;
  }
  .section-label {
    font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted);
  }
  .section-num {
    font-family: 'DM Serif Display', serif;
    font-size: 64px; color: rgba(255,255,255,0.04); line-height: 1;
    user-select: none;
  }

  /* QUESTION CARD */
  .question-block {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .question-block:has(.radio-opt input:checked) {
    border-color: rgba(200,240,85,0.25);
  }
  .question-block h3 {
    font-size: 13px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
  }
  .question-block h3 svg { width: 14px; height: 14px; flex-shrink: 0; }

  .radio-opt {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 10px 14px; border-radius: 8px; cursor: pointer;
    border: 0.5px solid transparent; transition: all 0.15s;
    margin-bottom: 4px;
  }
  .radio-opt:hover { background: var(--surface2); border-color: var(--border); }
  .radio-opt input[type="radio"] { display: none; }
  .radio-dot {
    width: 18px; height: 18px; border-radius: 50%;
    border: 1.5px solid var(--border2); flex-shrink: 0; margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .radio-dot::after {
    content: ''; width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); transform: scale(0); transition: transform 0.15s;
  }
  .radio-opt input:checked ~ .radio-dot { border-color: var(--accent); }
  .radio-opt input:checked ~ .radio-dot::after { transform: scale(1); }
  .radio-opt input:checked ~ .radio-text { color: var(--text); }
  .radio-text { font-size: 13.5px; color: var(--muted); line-height: 1.5; transition: color 0.15s; }
  .score-badge {
    margin-left: auto; flex-shrink: 0;
    background: var(--surface2); border: 0.5px solid var(--border);
    border-radius: 20px; padding: 2px 10px;
    font-size: 11px; font-weight: 500; color: var(--muted);
    white-space: nowrap;
  }

  .category-divider {
    display: flex; align-items: center; gap: 12px; margin: 36px 0 24px;
  }
  .category-divider span {
    font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); white-space: nowrap;
  }
  .category-divider::before, .category-divider::after {
    content: ''; flex: 1; height: 0.5px; background: var(--border);
  }

  /* RESULT */
  .result-panel {
    position: sticky; bottom: 24px; z-index: 10;
    margin-top: 48px;
  }
  .result-inner {
    background: rgba(14,14,16,0.92);
    border: 0.5px solid var(--border2);
    border-radius: 16px;
    padding: 28px 32px;
    backdrop-filter: blur(20px);
    display: flex; align-items: center; gap: 32px; flex-wrap: wrap;
  }
  .result-score {
    display: flex; flex-direction: column; align-items: center;
    flex: 1; min-width: 120px;
  }
  .result-score .label {
    font-size: 10px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 4px;
  }
  .result-score .value {
    font-family: 'DM Serif Display', serif;
    font-size: 52px; line-height: 1; font-weight: 400;
  }
  .result-score .sub {
    font-size: 12px; color: var(--muted); margin-top: 4px; text-align: center;
  }
  .trl-val { color: var(--trl-color); }
  .crl-val { color: var(--crl-color); }
  .result-divider { width: 0.5px; height: 80px; background: var(--border); flex-shrink: 0; }
  .result-desc {
    flex: 2; min-width: 200px;
  }
  .result-desc h4 { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
  .result-desc p { font-size: 13px; color: var(--muted); line-height: 1.6; }

  /* BAR CHART */
  .bars-section { margin-bottom: 32px; }
  .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .bar-label { font-size: 11px; color: var(--muted); width: 140px; flex-shrink: 0; text-align: right; }
  .bar-track {
    flex: 1; height: 6px; background: var(--surface2);
    border-radius: 3px; overflow: hidden;
  }
  .bar-fill {
    height: 100%; border-radius: 3px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }
  .bar-fill.trl { background: var(--trl-color); }
  .bar-fill.crl { background: var(--crl-color); }
  .bar-score { font-size: 12px; font-weight: 500; min-width: 28px; }
  .bar-score.trl { color: var(--trl-color); }
  .bar-score.crl { color: var(--crl-color); }

  /* PROGRESS */
  .progress-bar {
    height: 2px; background: var(--surface2); border-radius: 2px; margin-bottom: 8px;
  }
  .progress-fill {
    height: 100%; border-radius: 2px; background: var(--accent);
    transition: width 0.3s ease; width: 0%;
  }
  .progress-text { font-size: 11px; color: var(--muted); text-align: right; margin-bottom: 32px; }

  /* UNANSWERED WARNING */
  .warn { color: var(--red); font-size: 12px; margin-top: 8px; }

  /* EXPORT */
  .export-btn {
    background: var(--accent); color: #0e0e10;
    border: none; border-radius: 8px; padding: 10px 22px;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity 0.15s; letter-spacing: 0.03em;
  }
  .export-btn:hover { opacity: 0.85; }

  @media (max-width: 580px) {
    .profile-section { grid-template-columns: 1fr; }
    .result-inner { flex-direction: column; gap: 16px; }
    .result-divider { width: 80px; height: 0.5px; }
    .bar-label { width: 100px; font-size: 10px; }
  }
</style>
</head>
<body>
<div class="noise"></div>

<div class="container">
  <header>
    <div class="header-tag">Ferramenta de Avaliação</div>
    <h1>Calculadora <em>TRL / CRL</em></h1>
    <p>Avalie o nível de maturidade tecnológica e comercial de sua tecnologia com base nos critérios NASA / DOE / ARPA-E e NYSERDA.</p>
  </header>

  <div id="app"></div>
</div>

<script>
// ===================== MODEL =====================
class TechAssessment {
  constructor() {
    this.profile = { university: '', title: '' };
    this.answers = {};
  }

  setProfile(key, val) { this.profile[key] = val; }
  setAnswer(categoryId, score) { this.answers[categoryId] = score; }

  get trl() {
    const cats = ['technology', 'development'];
    const scores = cats.map(c => this.answers[c] || 0);
    if (scores.some(s => s === 0)) return null;
    const s = scores[0] + scores[1];
    if (s <= 2) return 1;
    if (s <= 3) return 2;
    if (s <= 4) return 3;
    if (s <= 5) return 4;
    if (s <= 6) return 5;
    if (s <= 7) return 6;
    if (s <= 8) return 7;
    if (s <= 9) return 8;
    return 9;
  }

  get crl() {
    const cats = ['definition','competitive','team','market','manufacturing'];
    const scores = cats.map(c => this.answers[c] || 0);
    const answered = scores.filter(s => s > 0);
    if (answered.length === 0) return null;
    const sum = answered.reduce((a, b) => a + b, 0);
    const avg = sum / answered.length;
    return Math.min(5, Math.max(1, Math.round(avg)));
  }

  get trlLabel() {
    const labels = {
      1: 'Princípios básicos observados',
      2: 'Conceito tecnológico formulado',
      3: 'Prova experimental do conceito',
      4: 'Tecnologia validada em lab',
      5: 'Tecnologia validada em ambiente relevante',
      6: 'Tecnologia demonstrada em ambiente relevante',
      7: 'Demonstração de sistema em ambiente operacional',
      8: 'Sistema completo e qualificado',
      9: 'Sistema comprovado em ambiente operacional',
    };
    return labels[this.trl] || '—';
  }

  get crlLabel() {
    const labels = {
      1: 'Mercado hipotético identificado',
      2: 'Viabilidade comercial básica',
      3: 'Cadeia de valor mapeada',
      4: 'Primeiros contratos / LOIs',
      5: 'Negócio autossustentável',
    };
    return labels[this.crl] || '—';
  }

  get answeredCount() { return Object.values(this.answers).filter(v => v > 0).length; }
  get totalCategories() { return 7; }
}

// ===================== DATA =====================
const CATEGORIES = [
  {
    id: 'technology',
    label: 'Estágio da Tecnologia',
    group: 'TRL — Maturidade Tecnológica',
    options: [
      { score: 1, text: 'A pesquisa básica foi realizada e experimentos iniciais geraram publicação científica' },
      { score: 2, text: 'A pesquisa aplicada foi iniciada e aplicações práticas foram identificadas' },
      { score: 3, text: 'Testes preliminares iniciaram; viabilidade técnica estabelecida em laboratório' },
      { score: 4, text: 'Testes iniciais em ambiente laboratorial foram completados' },
      { score: 5, text: 'Desempenho satisfatório demonstrado em escala laboratorial nas aplicações pretendidas' },
    ]
  },
  {
    id: 'development',
    label: 'Desenvolvimento',
    group: null,
    options: [
      { score: 1, text: 'Adequação inicial do produto/processo para o mercado foi definida' },
      { score: 2, text: 'Iniciada demonstração de protótipo em escala real em ambiente relevante' },
      { score: 3, text: 'Demonstração de protótipo em escala real em ambiente relevante finalizada' },
      { score: 4, text: 'Tecnologia validada em forma quase definitiva sob condições e ambientes representativos' },
      { score: 5, text: 'Tecnologia na forma definitiva, operada sob a totalidade das condições e ambientes operativos' },
    ]
  },
  {
    id: 'definition',
    label: 'Definição da Tecnologia',
    group: 'CRL — Maturidade Comercial',
    options: [
      { score: 1, text: 'Uma ou mais ideias iniciais da tecnologia foram definidas' },
      { score: 2, text: 'Mapeamento dos atributos da tecnologia em relação às necessidades do cliente evidenciou proposição de valor clara' },
      { score: 3, text: 'Tecnologia escalada para piloto; problemas para escala total identificados' },
      { score: 4, text: 'Modelo abrangente de proposição de valor desenvolvido, incluindo especificações de design e certificações' },
      { score: 5, text: 'Otimização final do design concluída, certificações obtidas e requisitos detalhados dos clientes incorporados' },
    ]
  },
  {
    id: 'competitive',
    label: 'Panorama Competitivo',
    group: null,
    options: [
      { score: 1, text: 'Pesquisa de mercado secundária realizada (busca por investidores)' },
      { score: 2, text: 'Pesquisa de mercado concluída com compreensão básica dos concorrentes' },
      { score: 3, text: 'Pesquisa de mercado abrangente concluída com compreensão intermediária dos concorrentes' },
      { score: 4, text: 'Análise competitiva com características e vantagens únicas da tecnologia finalizada' },
      { score: 5, text: 'Compreensão completa do panorama competitivo, aplicações-alvo e mercado alcançada' },
    ]
  },
  {
    id: 'team',
    label: 'Equipe',
    group: null,
    options: [
      { score: 1, text: 'Apenas pesquisador(es); sem empresa constituída' },
      { score: 2, text: 'Fundadores técnicos ou não-técnicos sem inserção em ambiente de inovação' },
      { score: 3, text: 'Fundadores com suporte de assessores externos e/ou incubadora/parque tecnológico' },
      { score: 4, text: 'Equipe equilibrada (técnico + negócios) com suporte de assessores ou aceleradora' },
      { score: 5, text: 'Equipe completa com todas capacidades incorporadas (vendas, marketing, ops etc.) e assessores externos' },
    ]
  },
  {
    id: 'market',
    label: 'Estratégia de Mercado',
    group: null,
    options: [
      { score: 1, text: 'Modelo de negócios inicial e proposição de valor estabelecidos' },
      { score: 2, text: 'Clientes entrevistados; modelo de negócios refinado com base em feedback' },
      { score: 3, text: 'Necessidades do mercado definidas; relações iniciais com partes-chave na cadeia de valor' },
      { score: 4, text: 'Parcerias estabelecidas com stakeholders-chave (fornecedores, parceiros, clientes)' },
      { score: 5, text: 'Acordos de fornecimento ativos e primeiros pedidos de compra recebidos' },
    ]
  },
  {
    id: 'manufacturing',
    label: 'Manufatura',
    group: null,
    options: [
      { score: 1, text: 'Potenciais fornecedores, parceiros e clientes identificados na cadeia de valor' },
      { score: 2, text: 'Relacionamentos com parceiros e clientes estabelecidos; contribuíram com requisitos de fabricação' },
      { score: 3, text: 'Qualificações de manufatura (QA/QC) definidas e em andamento' },
      { score: 4, text: 'Produtos fabricados em escala piloto e vendidos a clientes iniciais' },
      { score: 5, text: 'Manufatura em escala plena e implantação ampla do produto alcançadas' },
    ]
  },
];

// ===================== VIEW =====================
class AppView {
  constructor(container) {
    this.container = container;
    this.onAnswer = null;
    this.onProfile = null;
    this.onExport = null;
  }

  render(model) {
    const { profile, answers, trl, crl, trlLabel, crlLabel, answeredCount, totalCategories } = model;
    const progress = Math.round((answeredCount / totalCategories) * 100);

    let html = `
      <div class="profile-section">
        <div class="field-group">
          <label>Instituição / Incubadora</label>
          <input type="text" id="university" placeholder="Ex: Incubadora NidusTec" value="${this._esc(profile.university)}">
        </div>
        <div class="field-group">
          <label>Título da Tecnologia</label>
          <input type="text" id="title" placeholder="Ex: Nome da Empresa" value="${this._esc(profile.title)}">
        </div>
      </div>

      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:${progress}%"></div></div>
      <div class="progress-text">${answeredCount} de ${totalCategories} categorias respondidas</div>
    `;

    let lastGroup = null;
    CATEGORIES.forEach(cat => {
      if (cat.group && cat.group !== lastGroup) {
        lastGroup = cat.group;
        html += `<div class="category-divider"><span>${cat.group}</span></div>`;
      }
      const sel = answers[cat.id] || 0;
      html += `
        <div class="question-block" id="qblock-${cat.id}">
          <h3>
            <svg viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.2"/><path d="M7 4v4M7 9.5v.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
            ${cat.label}
          </h3>
          ${cat.options.map(opt => `
            <label class="radio-opt">
              <input type="radio" name="${cat.id}" value="${opt.score}" ${sel === opt.score ? 'checked' : ''}>
              <span class="radio-dot"></span>
              <span class="radio-text">${opt.text}</span>
              <span class="score-badge">Nível ${opt.score}</span>
            </label>
          `).join('')}
        </div>
      `;
    });

    // Results
    const trlPct = trl ? (trl / 9 * 100).toFixed(0) : 0;
    const crlPct = crl ? (crl / 5 * 100).toFixed(0) : 0;

    html += `
      <div class="bars-section" style="margin-top:40px">
        <div class="bar-row">
          <span class="bar-label">TRL — Tecnológica</span>
          <div class="bar-track"><div class="bar-fill trl" id="bar-trl" style="width:${trlPct}%"></div></div>
          <span class="bar-score trl">${trl !== null ? trl + '/9' : '—'}</span>
        </div>
        <div class="bar-row">
          <span class="bar-label">CRL — Comercial</span>
          <div class="bar-track"><div class="bar-fill crl" id="bar-crl" style="width:${crlPct}%"></div></div>
          <span class="bar-score crl">${crl !== null ? crl + '/5' : '—'}</span>
        </div>
      </div>

      <div class="result-panel">
        <div class="result-inner">
          <div class="result-score">
            <span class="label">TRL</span>
            <span class="value trl-val">${trl !== null ? trl : '?'}</span>
            <span class="sub">/ 9</span>
          </div>
          <div class="result-divider"></div>
          <div class="result-score">
            <span class="label">CRL</span>
            <span class="value crl-val">${crl !== null ? crl : '?'}</span>
            <span class="sub">/ 5</span>
          </div>
          <div class="result-divider"></div>
          <div class="result-desc">
            <h4>${trl !== null ? trlLabel : 'Responda as categorias de tecnologia'}</h4>
            <p>${crl !== null ? crlLabel : 'Responda as categorias comerciais para obter o CRL'}</p>
            ${answeredCount === totalCategories ? `<button class="export-btn" style="margin-top:14px" id="exportBtn">↓ Exportar relatório</button>` : ''}
          </div>
        </div>
      </div>
      <div style="height:32px"></div>
    `;

    this.container.innerHTML = html;
    this._bindEvents();
  }

  _bindEvents() {
    const uni = this.container.querySelector('#university');
    const ttl = this.container.querySelector('#title');
    if (uni) uni.addEventListener('input', e => this.onProfile && this.onProfile('university', e.target.value));
    if (ttl) ttl.addEventListener('input', e => this.onProfile && this.onProfile('title', e.target.value));

    CATEGORIES.forEach(cat => {
      this.container.querySelectorAll(`input[name="${cat.id}"]`).forEach(radio => {
        radio.addEventListener('change', e => {
          if (e.target.checked && this.onAnswer) this.onAnswer(cat.id, parseInt(e.target.value));
        });
      });
    });

    const expBtn = this.container.querySelector('#exportBtn');
    if (expBtn) expBtn.addEventListener('click', () => this.onExport && this.onExport());
  }

  _esc(s) { return (s || '').replace(/"/g, '&quot;').replace(/</g, '&lt;'); }
}

// ===================== CONTROLLER =====================
class AppController {
  constructor() {
    this.model = new TechAssessment();
    this.view = new AppView(document.getElementById('app'));

    this.view.onProfile = (key, val) => {
      this.model.setProfile(key, val);
    };

    this.view.onAnswer = (catId, score) => {
      this.model.setAnswer(catId, score);
      this.view.render(this.model);
      this._restoreScroll();
    };

    this.view.onExport = () => this._export();

    this.view.render(this.model);
  }

  _lastScrollY = 0;

  _restoreScroll() {
    const y = window.scrollY;
    requestAnimationFrame(() => window.scrollTo(0, y));
  }

  _export() {
    const m = this.model;
    const lines = [
      `RELATÓRIO DE MATURIDADE TECNOLÓGICA E COMERCIAL`,
      `================================================`,
      ``,
      `Instituição: ${m.profile.university || '—'}`,
      `Tecnologia:  ${m.profile.title || '—'}`,
      `Data:        ${new Date().toLocaleDateString('pt-BR')}`,
      ``,
      `RESULTADOS`,
      `----------`,
      `TRL (Nível de Maturidade Tecnológica): ${m.trl !== null ? m.trl + '/9 — ' + m.trlLabel : 'Incompleto'}`,
      `CRL (Nível de Maturidade Comercial):   ${m.crl !== null ? m.crl + '/5 — ' + m.crlLabel : 'Incompleto'}`,
      ``,
      `RESPOSTAS POR CATEGORIA`,
      `-----------------------`,
    ];
    CATEGORIES.forEach(cat => {
      const score = m.answers[cat.id] || 0;
      const opt = cat.options.find(o => o.score === score);
      lines.push(`${cat.label}: Nível ${score}${opt ? ' — ' + opt.text : ' (não respondido)'}`);
    });

    const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'relatorio_trl_crl.txt'; a.click();
    URL.revokeObjectURL(url);
  }
}

// ===================== INIT =====================
document.addEventListener('DOMContentLoaded', () => new AppController());
</script>
